<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - AI Director V3.8 PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --bg: #020617; --accent: #7c3aed; --panel: #0f172a; --text: #f8fafc; --green: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 40px; color: var(--text); margin: 0; }
        .wrapper { max-width: 1750px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; }
        .panel { background: var(--panel); padding: 40px; border-radius: 32px; border: 1px solid rgba(124, 58, 237, 0.4); position: sticky; top: 40px; }
        h1 { margin: 0 0 10px 0; font-size: 1.8rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        p.desc { color: #94a3b8; font-size: 0.85rem; margin-bottom: 25px; line-height: 1.5; }
        textarea { width: 100%; height: 150px; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; color: #fff; font-size: 1rem; margin-bottom: 20px; resize: none; box-sizing: border-box; }
        .director-btn { background: var(--accent); color: #fff; border: none; padding: 22px; width: 100%; border-radius: 16px; cursor: pointer; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; transition: 0.3s; }
        .output-box { background: #000; color: #a78bfa; padding: 40px; border-radius: 28px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; height: 90vh; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; border: 1px solid #1e293b; }
        .btn-home { background: rgba(100, 116, 139, 0.1); color: #94a3b8; border: 1px solid rgba(100, 116, 139, 0.2); padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; margin-top: 15px; }
        #toast { visibility: hidden; min-width: 250px; background-color: var(--green); color: #000; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 1000; left: 50%; transform: translateX(-50%); top: 30px; font-weight: 900; text-transform: uppercase; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 30px; opacity: 0;} }
    </style>
</head>
<body>

<div id="toast">Produkcijska skripta kopirana! 🎬</div>

<div class="wrapper">
    <div class="panel">
        <h1>🎬 AI Director V3.8</h1>
        <p class="desc">Vnesi vizijo scene. Sistem bo uporabil Ref 0 kot **fiksno sidro** za osebo in predmete, nato pa zgeneriral 10-slojno produkcijo.</p>
        
        <textarea id="vision" placeholder="Npr.: Karakter sedi v deževnem Milanu, pije kavo, neonski odsevi..."></textarea>
        
        <button class="director-btn" onclick="generateOrchestration()">🚀 ORKESTRIRAJ SCENO</button>
        <button class="btn-home" onclick="window.location.href='index.html'">🏠 DASHBOARD</button>
    </div>

    <div id="out" class="output-box">// Čakam na tvojo režisersko vizijo (Ref 0 bo zaklenjen)...</div>
</div>

<script>
    function generateOrchestration() {
        const v = document.getElementById('vision').value;
        if (!v) return;

        let res = `MASTER SCENE ORCHESTRATION - V3.8 (LOCKED ANCHOR SYSTEM)\n`;
        res += `CORE ANCHOR: Reference Image 0 (STRICT IDENTITY & OBJECT LOCK)\n`;
        res += `DIRECTOR VISION: ${v.toUpperCase()}\n`;
        res += `===========================================================\n\n`;

        res += `PHASE 1: ANCHOR VALIDATION\n`;
        res += `[IMAGE ANCHOR]: Strictly use Ref 0 as the absolute blueprint for person and objects.\n`;
        res += `[IMMUTABLE ASSET]: Do NOT re-interpret or change the person's face, hair, or DNA from Ref 0.\n`;
        res += `[OBJECT PERSISTENCE]: Maintain 1:1 geometry and realism of all objects/props seen in Ref 0.\n`;
        res += `-----------------------------------------------------------\n\n`;

        res += `PHASE 2: PRODUCTION STILLS (The 10-Layer Execution)\n`;
        res += `[PROMPT]: High-fidelity photograph of subject and objects from Ref 0. ${v}.\n\n`;
        res += `[LAYER 1-4: CONTENT]:\n`;
        res += `- hyper-realistic, raw, candid photograph [cite: 2026-04-13].\n`;
        res += `- subject and objects placed into: ${v} [cite: 2026-04-13].\n\n`;
        res += `[LAYER 5: CAMERA]:\n`;
        res += `- 28mm/35mm prime lens, organic handheld shake, digital noise [cite: 2026-04-13].\n\n`;
        res += `[LAYER 6-8: TECHNICAL]:\n`;
        res += `- On-camera flash, harsh shadows, dirty cinematic grading [cite: 2026-04-13].\n`;
        res += `- heavy film grain, vignette, atmospheric particles [cite: 2026-04-13].\n\n`;
        res += `[LAYER 9-10: RAW REALISM]:\n`;
        res += `- Mandatory skin/material texture: visible pores, micro-details [cite: 2026-04-13].\n`;
        res += `- spontaneous, intimate moment, absolute DNA consistency [cite: 2026-04-13].\n\n`;
        res += `[NEGATIVE PROMPT]: background drift, object morphing, identity shift, plastic skin, CGI, beauty filter.\n`;
        res += `-----------------------------------------------------------\n\n`;

        res += `PHASE 3: MOTION DYNAMICS (VEO Engine)\n`;
        res += `[VEO PROMPT]: Cinematic video based on Ref 0. Action: ${v}.\n`;
        res += `[TEMPORAL ANCHOR]: Ref 0 is the starting state. Zero identity or object drift.\n`;
        res += `[MOTION]: Natural micro-movements, breathing, and realistic physics interaction with the objects from Ref 0.\n`;
        res += `===========================================================\n`;

        document.getElementById('out').innerText = res;
        navigator.clipboard.writeText(res);
        var x = document.getElementById("toast");
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 1500);
    }
</script>
</body>
</html>
