<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>AI Universa - Wardrobe & Niche Studio V100</title>
    <style>
        :root { --primary: #0f172a; --accent: #ec4899; --bg: #f8fafc; --phase2: #7c3aed; --home: #64748b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .wrapper { max-width: 1750px; margin: 0 auto; display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 30px; }
        .panel { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); border: 1px solid #e2e8f0; height: fit-content; }
        
        .header { text-align: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #f1f5f9; }
        .badge { background: var(--accent); color: #fff; padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        h1 { margin: 10px 0; font-size: 1.4rem; color: var(--primary); font-weight: 900; }

        h2 { font-size: 0.8rem; text-transform: uppercase; color: #64748b; margin: 25px 0 12px 0; border-left: 4px solid var(--accent); padding-left: 10px; }
        .group { margin-bottom: 18px; }
        label { display: block; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; }
        select, textarea, input { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; background: #fff; font-size: 0.9rem; cursor: pointer; box-sizing: border-box; }
        
        .output-box { background: #0f172a; color: #cbd5e1; padding: 30px; border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; height: 1100px; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; border: 1px solid #1e293b; position: sticky; top: 20px; }
        
        .btn-copy { background: var(--accent); color: white; border: none; padding: 20px; width: 100%; border-radius: 14px; cursor: pointer; font-size: 1.1rem; font-weight: 800; margin-top: 10px; transition: 0.3s; text-transform: uppercase; box-shadow: 0 10px 20px rgba(236, 72, 153, 0.2); }
        .btn-copy:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(236, 72, 153, 0.3); }

        .btn-nav { background: var(--home); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 0.9rem; font-weight: 800; margin-top: 10px; transition: 0.3s; text-transform: uppercase; }
        .btn-nav.phase2 { background: var(--phase2); margin-top: 20px; }
        
        .niche-selector { background: #fff1f2; padding: 20px; border-radius: 18px; border: 1px solid #fecdd3; margin-bottom: 25px; }
    </style>
</head>

            <h1>🎭 Stiling in Produkcija</h1>
        </div>

        <div class="niche-selector">
            <div class="group">
                <label>🎯 IZBERI NIŠO (Market demand)</label>
                <select id="niche" onchange="updateNiche()">
                    <option value="business">1. Business & Corporate (Poslovno)</option>
                    <option value="luxury">2. Luxury & Wealth (Prestiž)</option>
                    <option value="fitness">3. Fitness & Health (Šport)</option>
                    <option value="urban">4. Urban & Streetwear (Ulično)</option>
                    <option value="tech">5. Tech & Innovation (Tehnologija)</option>
                    <option value="nature">6. Nature & Adventure (Narava)</option>
                    <option value="home">7. Home & Lifestyle (Udobje)</option>
                    <option value="medical">8. Medical & Wellness (Zdravstvo)</option>
                    <option value="auto">9. Automotive & Racing (Avtomobili)</option>
                    <option value="casual">10. Casual & Social (Vsakdanje)</option>
                </select>
            </div>
        </div>

        <h2>1. Izgled in Oblačila</h2>
        <div class="group">
            <label>Obleka (Outfit)</label>
            <select id="outfit" onchange="update()"></select>
        </div>
        <div class="group">
            <label>Obutev (Footwear)</label>
            <select id="footwear" onchange="update()"></select>
        </div>

        <h2>2. Scena in Predmeti</h2>
        <div class="group">
            <label>Okolje (Scenery)</label>
            <select id="scene" onchange="update()"></select>
        </div>
        <div class="group">
            <label>Predmet v roki / Interakcija (Object)</label>
            <select id="object" onchange="update()"></select>
        </div>

        <h2>3. Kamera in Kot</h2>
        <div class="group">
            <label>Zorni kot (Povzeto iz Faze 2)</label>
            <select id="angle" onchange="update()">
                <option value="waist-up medium shot, 3/4 view">Srednji posnetek (3/4)</option>
                <option value="full body standing shot">Celotna postava</option>
                <option value="extreme close-up macro, focus on face">Makro obraz</option>
                <option value="sitting relaxed, candid angle">Sedeča poza</option>
            </select>
        </div>

        <button class="btn-copy" onclick="copy()">📋 KOPIRAJ STYLING PROMPT</button>
        
        <button class="btn-nav phase2" onclick="window.location.href='production_module.html'">⬅ NAZAJ NA GEOMETRIJO (FAZA 2)</button>
        <button class="btn-nav" onclick="window.location.href='../index.html'">🏠 NAZAJ NA NADZORNO PLOŠČO</button>
    </div>

    <div class="output-box" id="out"></div>
</div>

    function updateNiche() {
        const niche = document.getElementById('niche').value;
        const data = DATA[niche];
        
        const populate = (id, list) => {
            const el = document.getElementById(id);
            el.innerHTML = list.map(item => `<option value="${item}">${item}</option>`).join('');
        };

        populate('outfit', data.outfits);
        populate('footwear', data.footwear);
        populate('scene', data.scenes);
        populate('object', data.objects);
        update();
    }

    function update() {
        const ang = document.getElementById('angle').value;
        const out = document.getElementById('outfit').value;
        const foot = document.getElementById('footwear').value;
        const sc = document.getElementById('scene').value;
        const obj = document.getElementById('object').value;

        const final = `MASTER STYLING PROMPT (V160 - IDENTITY BLUEPRINT LOCK):

Sloji 1-4 (Vsebina & Identiteta): 
Hyper-realistic raw **${ang}**. 
[IMAGE 0 BLUEPRINT LOCK]: Use Reference Image 0 as the absolute, immutable source for facial DNA and bone structure. Identity is fixed and isolated from style. Zero deviation in facial features, forehead height, or eyebrow shape regardless of wardrobe change.
[NEW ENVIRONMENT]: Scene is ${sc}. 
[WARDROBE OVERRIDE]: Subject is now wearing ${out} and ${foot}. Focus on high fabric detail and realistic textures.
[ACTION]: Subject is ${obj}.

Sloj 5 (Kamera): Shot on 35mm lens, handheld shake, subtle motion blur, digital noise, chromatic aberration for raw analog realism.

Sloji 6-8 (Tehnični): Lighting matched to ${sc}. Realistic light wrap and reflections on the subject. Atmosphere: dust particles, realistic depth of field. Colors: dirty cinematic grading, heavy film grain, vignette.

Sloji 9-10 (Realizem): Mandatory skin texture: visible pores, natural skin imperfections matching the reference DNA precisely. Strictly match ONLY the existing skin marks and pore distribution from Ref 0. PROHIBIT any new moles or freckles. Zero digital retouching.

NEGATIVE PROMPT: different heritage, changed bone structure, different face, different hair, extra volume, symmetrical face, airbrushed, studio lighting, clean background, 3D render, CGI, cartoon, doll-like, beauty filter, extra moles, freckles, original clothing from reference.`;

        document.getElementById('out').innerText = final;
    }

    function copy() {
        navigator.clipboard.writeText(document.getElementById('out').innerText);
        alert("STYLING PROMPT KOPIRAN!");
    }
