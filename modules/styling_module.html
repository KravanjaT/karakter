<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - Delivery & Double Anchor Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --primary: #0f172a; --accent: #eab308; --bg: #020617; --home: #64748b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; padding: 40px; margin: 0; }
        
        /* NOISE OVERLAY */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.1; pointer-events: none; z-index: 100; }
        
        .wrapper { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; z-index: 10; position: relative; }
        .panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; border: 1px solid rgba(234, 179, 8, 0.2); }
        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 900; margin-top: 0; }
        
        .instruction { background: rgba(234, 179, 8, 0.05); padding: 20px; border-radius: 16px; border-left: 4px solid var(--accent); margin-bottom: 25px; font-size: 0.8rem; line-height: 1.6; color: #fde68a; }
        .group { margin-bottom: 20px; }
        label { display: block; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; font-size: 0.9rem; }
        
        .output-box { background: #0f172a; color: #cbd5e1; padding: 30px; border-radius: 24px; font-family: 'JetBrains+Mono', monospace; font-size: 0.85rem; height: 900px; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; border: 1px solid #1e293b; position: sticky; top: 40px; }
        .btn-copy { background: var(--accent); color: #000; border: none; padding: 20px; width: 100%; border-radius: 16px; cursor: pointer; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; transition: 0.3s; margin-top: 20px; }
        .btn-copy:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(234, 179, 8, 0.3); }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="panel">
        <h1>📦 Delivery & Double Anchor</h1>
        
        <div class="instruction">
            <strong>DOUBLE LOCK PROTOCOL:</strong><br>
            • IMAGE 0: Character DNA Anchor (Oseba)<br>
            • IMAGE 1: Product Anchor (Izdelek/Grafit)
        </div>

        <div class="group">
            <label>1. Izberi Končno Okolje (Sloj 03)</label>
            <select id="background" onchange="update()">
                <option value="in a raw industrial art gallery with exposed concrete walls and minimalist spotlights">Industrialna Galerija</option>
                <option value="in a high-end luxury penthouse with city lights bokeh in the background">Luksuzni Penthouse</option>
                <option value="in a messy, lived-in artist studio with paint splatters and canvases leaning against walls">Umetniški Atelje (Lived-in)</option>
                <option value="outside on a busy urban street with cinematic night-time traffic reflections">Mestna Ulica (Noč)</option>
                <option value="in a minimalist modern bathroom with harsh top lighting and steamy mirrors">Kopalnica (Modern)</option>
            </select>
        </div>

        <div class="group">
            <label>Ali pa vpiši svoje ozadje</label>
            <input type="text" id="customScene" placeholder="npr. na sončni plaži ob sončnem zahodu" oninput="update()">
        </div>

        <div class="group">
            <label>2. Akcija & Grip (Interakcija z izdelkom)</label>
            <select id="action" onchange="update()">
                <option value="carefully holding and presenting the specific product directly towards the camera with both hands">Predstavitev kameri (Dve roki)</option>
                <option value="holding the product in one hand in a relaxed, candid pose, looking slightly off-camera">Sproščena poza (Ena roka)</option>
                <option value="actively interacting with the product, showing natural finger tension and realistic grip">Aktivna uporaba (Detajli prstov)</option>
            </select>
        </div>

        <div class="group">
            <label>3. Oblačila (Sloj 04)</label>
            <input type="text" id="outfit" placeholder="npr. oversized black hoodie with fabric texture" oninput="update()">
        </div>

        <button class="btn-copy" onclick="copy()">📋 KOPIRAJ DVOJNI PROMPT (V140)</button>
        <button style="margin-top:15px; background:var(--home);" class="btn-copy" onclick="window.location.href='../index.html'">🏠 NAZAJ NA DASHBOARD</button>
    </div>

    <div class="output-box" id="out"></div>
</div>

<script>
    function update() {
        const bgSelect = document.getElementById('background').value;
        const customBg = document.getElementById('customScene').value;
        const scene = customBg || bgSelect;
        const act = document.getElementById('action').value;
        const outfit = document.getElementById('outfit').value || "simple cotton t-shirt with visible weave";

        const finalPrompt = `MASTER PRODUCTION PROMPT (V140 - DOUBLE LOCK):

SLOJI 01-04 (Vsebina & Identiteta): Hyper-realistic raw waist-up portrait. 
[IMAGE 0 LOCK]: Subject must exactly match the facial DNA, eye color, and dark brown hair from reference image 0. 
[IMAGE 1 LOCK]: Subject is holding and presenting the EXACT product/artwork from reference image 1. Zero changes to colors, patterns, or tag details.
[ACTION]: Subject is ${act}. 
[WARDROBE]: Wearing a ${outfit}.
[SCENE]: Located ${scene}.

SLOJ 05 (Kamera): Shot on 28mm wide-angle lens, handheld shake, subtle motion blur, digital noise for raw analog realism.

SLOJ 06-08 (Tehnični): Lighting matched to ${scene}. Direct on-camera flash, harsh shadows. Atmosphere: visible dust particles and air motes caught in the flash beam. Dirty cinematic grading, heavy film grain, vignette.

SLOJ 09 (Realizem): Mandatory skin texture: visible pores, natural imperfections (moles, redness) matching image 0 DNA, zero digital retouching, oily sheen.

SLOJ 10 (Vzdušje): Spontaneous, raw private moment, unposed production shot.

NEGATIVE PROMPT: perfect skin, airbrushed, CGI, soft studio lighting, clean background, 3D render, cartoon, doll-like, beauty filter, different heritage.`;

        document.getElementById('out').innerText = finalPrompt;
    }
    function copy() { navigator.clipboard.writeText(document.getElementById('out').innerText); alert("PROMPT KOPIRAN!"); }
    update();
</script>
</body>
</html>
