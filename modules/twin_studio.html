<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - Digital Twin Studio V2.2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --primary: #0f172a; --accent: #22d3ee; --bg: #020617; --home: #64748b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; padding: 40px; margin: 0; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.1; pointer-events: none; z-index: 100; }
        .wrapper { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; position: relative; z-index: 10; }
        .panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; border: 1px solid rgba(34, 211, 238, 0.3); }
        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 900; margin-top: 0; }
        .instruction { background: rgba(34, 211, 238, 0.05); padding: 20px; border-radius: 16px; border-left: 4px solid var(--accent); margin-bottom: 25px; font-size: 0.8rem; color: #a5f3fc; }
        .group { margin-bottom: 20px; }
        label { display: block; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; }
        select, input, textarea { width: 100%; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 0.9rem; }
        .output-box { background: #0f172a; color: #cbd5e1; padding: 30px; border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; height: 900px; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; border: 1px solid #1e293b; position: sticky; top: 40px; }
        .btn-copy { background: var(--accent); color: #000; border: none; padding: 20px; width: 100%; border-radius: 16px; cursor: pointer; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; transition: 0.3s; margin-top: 20px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="panel">
        <h1>👤 Digital Twin Studio</h1>
        <div class="instruction">
            <strong>IDENTITY INJECTION PROTOCOL:</strong><br>
            Uporabi svojo bazno fotografijo (IMAGE 0) in vanjo "vbrizgaj" izdelek (IMAGE 1). AI bo obdržal tvojo identiteto in nadgradil realizem.
        </div>

        <div class="group">
            <label>1. Izberi Master Pozo (Tvoja slika Ref 0)</label>
            <select id="pose" onchange="update()">
                <option value="Beauty Close-up: focus on face and hands near chin, holding a small object.">01 - Beauty Close-up (Kreme/Nakit)</option>
                <option value="Lifestyle Lean: leaning on a cafe table, relaxed posture with a drink in hand.">02 - Lifestyle Lean (Kava/Pijače)</option>
                <option value="Canvas Showcase: standing straight, holding a flat canvas/object with both hands.">03 - Canvas Showcase (Grafiti/Slike)</option>
                <option value="Tech Interaction: looking down at hands while interacting with a gadget.">04 - Tech Interaction (Gadgeti/Telefon)</option>
                <option value="Luxury Seated: sitting in a premium car/chair, holding object on the knee.">05 - Luxury Seated (Old Money/Auto)</option>
            </select>
        </div>

        <div class="group">
            <label>2. Izdelek za integracijo (Iz Ref 1)</label>
            <input type="text" id="product" placeholder="npr. mat črna steklenička, grafit na platnu..." oninput="update()">
        </div>

        <div class="group">
            <label>3. Nadgradnja Realizma (Sloj 09)</label>
            <select id="skin" onchange="update()">
                <option value="visible pores, natural skin texture, light catching fine downy hair, realistic imperfections">Popolna tekstura kože (Sloj 09)</option>
                <option value="slightly oily skin sheen, sweat beads, high detail on pores and moles">Surov/Znojen realizm (Gym/Outdoor)</option>
                <option value="soft morning glow, natural subsurface scattering, zero digital smoothing">Mehak jutranji realizm (Home/Beauty)</option>
            </select>
        </div>

        <button class="btn-copy" onclick="copy()">📋 KOPIRAJ TWIN INJECTOR PROMPT</button>
        <button style="margin-top:15px; background:var(--home); color:white;" class="btn-copy" onclick="window.location.href='../index.html'">🏠 NAZAJ NA DASHBOARD</button>
    </div>
    <div class="output-box" id="out"></div>
</div>

<script>
    function update() {
        const pose = document.getElementById('pose').value;
        const prod = document.getElementById('product').value || "[IZDELEK]";
        const skin = document.getElementById('skin').value;

        const final = `MASTER TWIN INJECTOR (V150):

SLOJI 01-04 (Vsebina & DNA): 
[IMAGE 0 LOCK]: Use reference image 0 as the master identity, pose, and composition template. Subject is ${pose}. 
[IMAGE 1 LOCK]: Integrate the EXACT product from reference image 1 (${prod}) into the subject's hands. 
[ACTION]: Flawlessly merge the identity of Ref 0 with the product DNA of Ref 1. Maintain the original silhouette.

SLOJ 05 (Kamera): Shot on 35mm prime lens, handheld shake, digital noise, chromatic aberration for raw analog feel [cite: 93-96].

SLOJI 06-08 (Tehnični): Match environmental lighting from Ref 0. Apply a direct on-camera fill flash on the subject and product. Atmosphere: visible dust particles and paint/haze motes[cite: 102, 108].

SLOJ 09 (Realizem): MANDATORY: ${skin}. No plastic skin, no CGI, no airbrushing. Skin must show pores and fine details [cite: 136-147].

SLOJ 10 (Vzdušje): Spontaneous, unposed, private archive moment[cite: 127].`;

        document.getElementById('out').innerText = final;
    }
    function copy() { navigator.clipboard.writeText(document.getElementById('out').innerText); alert("TWIN PROMPT KOPIRAN!"); }
    update();
</script>
</body>
</html>
