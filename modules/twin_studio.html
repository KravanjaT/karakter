<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - Master Asset Studio V7.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --primary: #0f172a; --accent: #22d3ee; --bg: #020617; --home: #64748b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; padding: 40px; margin: 0; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.1; pointer-events: none; z-index: 100; }
        .wrapper { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; position: relative; z-index: 10; }
        .panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; border: 1px solid rgba(34, 211, 238, 0.3); }
        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 900; margin-top: 0; }
        .instruction { background: rgba(34, 211, 238, 0.05); padding: 20px; border-radius: 16px; border-left: 4px solid var(--accent); margin-bottom: 25px; font-size: 0.8rem; color: #a5f3fc; }
        .group { margin-bottom: 20px; }
        label { display: block; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; letter-spacing: 1px; }
        textarea, select, input { width: 100%; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 0.9rem; }
        .output-box { background: #0f172a; color: #cbd5e1; padding: 30px; border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; height: 1000px; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; border: 1px solid #1e293b; position: sticky; top: 40px; }
        .btn-copy { background: var(--accent); color: #000; border: none; padding: 20px; width: 100%; border-radius: 16px; cursor: pointer; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; transition: 0.3s; margin-top: 20px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="panel">
        <h1>👤 Identity Blueprint Lock</h1>
        <div class="instruction">
            <strong>IDENTITY PRESERVATION:</strong><br>
            Uporabi to za obdelavo "čiste" fotografije. AI bo sliko le tehnično nadgradil (tekstura, svetloba), medtem ko bo tvoj obraz in frizuro ohranil 100 % identična.
        </div>

        <div class="group">
            <label>1. DNA Identiteta (Opiši realno stanje)</label>
            <input type="text" id="faceDNA" placeholder="npr. oval face, light hazel eyes, specific jawline..." oninput="update()">
            <input type="text" id="hairDNA" style="margin-top:10px;" placeholder="npr. dark brown wavy hair, specific messy bun texture..." oninput="update()">
        </div>

        <div class="group">
            <label>2. Tip Master Obdelave</label>
            <select id="lockMode" onchange="update()">
                <option value="IMAGE-TO-IMAGE BLUEPRINT: Use Ref 0 as an absolute pixel-perfect blueprint for facial geometry. No changes to bone structure or hair volume.">Popolno ujemanje geometrije (Blueprint)</option>
                <option value="STUDIO ENHANCEMENT: Keep original face and hair, only upgrade skin texture to professional 8K studio quality.">Studijska nadgradnja teksture</option>
            </select>
        </div>

        <div class="group">
            <label>3. Svetloba & Studio</label>
            <select id="studio" onchange="update()">
                <option value="against a professional grey cyclorama studio wall with high-end lighting">Professional Grey Studio</option>
                <option value="inside a clean minimalist white studio with natural soft shadows">White Fashion Studio</option>
            </select>
        </div>

        <button class="btn-copy" onclick="copy()">📋 KOPIRAJ BLUEPRINT LOCK PROMPT</button>
        <button style="margin-top:15px; background:var(--home); color:white;" class="btn-copy" onclick="window.location.href='../index.html'">🏠 NAZAJ NA DASHBOARD</button>
    </div>
    <div class="output-box" id="out"></div>
</div>

<script>
    function update() {
        const face = document.getElementById('faceDNA').value || "exact facial features from Ref 0";
        const hair = document.getElementById('hairDNA').value || "exact hair texture from Ref 0";
        const lock = document.getElementById('lockMode').value;
        const studio = document.getElementById('studio').value;

        const final = `MASTER ASSET BLUEPRINT (V7.0 - IDENTITY LOCK):

SLOJI 1-4 (Identiteta): 
[IMAGE 0 BLUEPRINT]: Use Reference Image 0 as the absolute, immutable source for identity. 
[STRICT DNA LOCK]: Subject must match the exact ${face} and ${hair}. 
[GEOMETRY]: Zero changes to facial bone structure, forehead height, or eyebrow shape. 
[ENVIRONMENT]: Set the subject ${studio}.

SLOJ 5 (Kamera): 35mm lens, tripod-mounted for stability, minor digital noise for raw realism.

SLOJI 6-8 (Tehnični): Professional studio lighting. Direct on-camera flash combined with soft-box fill. Harsh realistic shadows. Atmosphere: visible dust particles. Dirty cinematic grading, heavy film grain, vignette.

SLOJ 9 (Realizem): Mandatory skin texture: visible pores, natural skin sheen matching Ref 0 identity. STRICTLY PROHIBIT any new moles. Match ONLY existing skin marks. No plastic skin, no CGI, zero retouching.

SLOJ 10 (Vzdušje): Professional reference asset shot. Spontaneous, raw production anchor.

NEGATIVE PROMPT: perfect skin, airbrushed, CGI, 3D render, beauty filter, different face, different hair, extra volume, symmetrical, cartoon, doll-like, extra moles, freckles.`;

        document.getElementById('out').innerText = final;
    }
    function copy() { navigator.clipboard.writeText(document.getElementById('out').innerText); alert("BLUEPRINT PROMPT KOPIRAN!"); }
    update();
</script>
</body>
</html>
