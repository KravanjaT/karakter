<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - Master Asset Studio V3.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --primary: #0f172a; --accent: #22d3ee; --bg: #020617; --home: #64748b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; padding: 40px; margin: 0; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.1; pointer-events: none; z-index: 100; }
        .wrapper { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; position: relative; z-index: 10; }
        .panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; border: 1px solid rgba(34, 211, 238, 0.3); }
        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 900; margin-top: 0; }
        .instruction { background: rgba(34, 211, 238, 0.05); padding: 20px; border-radius: 16px; border-left: 4px solid var(--accent); margin-bottom: 25px; font-size: 0.8rem; color: #a5f3fc; }
        .group { margin-bottom: 25px; }
        label { display: block; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; letter-spacing: 1px; }
        textarea, select { width: 100%; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 0.9rem; line-height: 1.5; }
        .output-box { background: #0f172a; color: #cbd5e1; padding: 30px; border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; height: 950px; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; border: 1px solid #1e293b; position: sticky; top: 40px; }
        .btn-copy { background: var(--accent); color: #000; border: none; padding: 20px; width: 100%; border-radius: 16px; cursor: pointer; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; transition: 0.3s; margin-top: 20px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="panel">
        <h1>👤 Asset Studio Reconstructor</h1>
        <div class="instruction">
            <strong>STUDIO UPGRADE PROTOCOL:</strong><br>
            Uvozi svojo RAW fotografijo (IMAGE 0). Ta modul jo bo prestavil v kontrolirano studijsko okolje, popravil osvetlitev in zaklenil tvojo DNA identiteto za prihodnjo uporabo[cite: 183, 190].
        </div>

        <div class="group">
            <label>1. Opis Master poze (Kaj počneš na sliki?)</label>
            <textarea id="baseDesc" rows="3" placeholder="npr. Moški v črni majici sedi, drži roko pred seboj, gleda v kamero..." oninput="update()"></textarea>
        </div>

        <div class="group">
            <label>2. Izberi Novo Studijsko Okolje</label>
            <select id="studio" onchange="update()">
                <option value="in a professional high-end photography studio with a clean, minimalist grey concrete backdrop">Professional Gallery Studio (Neutral)</option>
                <option value="inside a dimly lit industrial warehouse with dramatic spotlights and shadows">Industrial Warehouse Studio (Vibe)</option>
                <option value="in a minimalist luxury apartment with floor-to-ceiling windows and soft daylight">Luxury Daylight Studio (Soft)</option>
                <option value="against a dark, textured charcoal wall with a single overhead spotlight">Dramatic Dark Studio (High Contrast)</option>
            </select>
        </div>

        <div class="group">
            <label>3. Svetlobni Master (Sloj 06)</label>
            <select id="lighting" onchange="update()">
                <option value="High-contrast on-camera flash, creating sharp specular highlights on skin and fabric.">Aggressive On-Camera Flash [cite: 102]</option>
                <option value="Cinematic soft-box lighting, gentle wrap-around light with deep but soft shadows.">Cinematic Soft-Box (Editorial)</option>
                <option value="Warm tungsten lighting from the side, creating a three-dimensional depth.">Tungsten Side Light (Depth)</option>
            </select>
        </div>

        <button class="btn-copy" onclick="copy()">📋 KOPIRAJ STUDIO RECONSTRUCTOR PROMPT</button>
        <button style="margin-top:15px; background:var(--home); color:white;" class="btn-copy" onclick="window.location.href='../index.html'">🏠 NAZAJ NA DASHBOARD</button>
    </div>
    <div class="output-box" id="out"></div>
</div>

<script>
    function update() {
        const base = document.getElementById('baseDesc').value || "[OPIŠI SVOJO POZO]";
        const studio = document.getElementById('studio').value;
        const light = document.getElementById('lighting').value;

        const final = `MASTER ASSET RECONSTRUCTOR (V3.0 - STUDIO LOCK): [cite: 12, 59]

SLOJI 01-04 (Vsebina & DNA):
[IMAGE 0 LOCK]: Use reference image 0 as the master template for identity and pose. Subject is ${base}. [cite: 190]
[STUDIO REBUILD]: Completely reconstruct the background and environment to be ${studio}. [cite: 80]
[IDENTITY]: Strictly preserve facial DNA, bone structure, eye color, and hair from Ref 0. [cite: 194, 201]

SLOJ 05 (KAMERA): Shot on 35mm prime lens, handheld documentary style, subtle digital noise, high-ISO grain for raw realism. [cite: 95, 157]

SLOJI 06-08 (TEHNIČNI):
[LIGHTING]: ${light} [cite: 102]
[ATMOSPHERE]: Visible dust particles and air motes caught in the light beams. [cite: 108]
[COLOR]: Dirty cinematic grading, heavy film grain, slight vignette. [cite: 114]

SLOJ 09 (REALIZEM): Mandatory skin texture: visible pores, natural skin sheen, realistic skin marks from Ref 0. [cite: 137, 139] STRICTLY PROHIBIT new moles or freckles. No plastic skin, no CGI, zero digital retouching. [cite: 147]

SLOJ 10 (VZDUŠJE): Spontaneous, raw production anchor, unposed but professional asset quality. [cite: 127]

NEGATIVE PROMPT: perfect skin, airbrushed, CGI, soft studio lighting, clean background, 3D render, cartoon, doll-like, beauty filter, different heritage, new moles. [cite: 257, 319]`;

        document.getElementById('out').innerText = final;
    }
    function copy() { navigator.clipboard.writeText(document.getElementById('out').innerText); alert("STUDIO PROMPT KOPIRAN!"); }
    update();
</script>
</body>
</html>
