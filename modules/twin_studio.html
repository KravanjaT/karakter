<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - Master Asset Studio V5.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --primary: #0f172a; --accent: #22d3ee; --bg: #020617; --home: #64748b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; padding: 40px; margin: 0; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.1; pointer-events: none; z-index: 100; }
        .wrapper { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; position: relative; z-index: 10; }
        .panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; border: 1px solid rgba(34, 211, 238, 0.3); }
        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 900; margin-top: 0; }
        .instruction { background: rgba(34, 211, 238, 0.05); padding: 20px; border-radius: 16px; border-left: 4px solid var(--accent); margin-bottom: 25px; font-size: 0.8rem; color: #a5f3fc; }
        .group { margin-bottom: 20px; }
        label { display: block; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; letter-spacing: 1px; }
        textarea, select, input { width: 100%; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 0.9rem; }
        .output-box { background: #0f172a; color: #cbd5e1; padding: 30px; border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; height: 1050px; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; border: 1px solid #1e293b; position: sticky; top: 40px; }
        .btn-copy { background: var(--accent); color: #000; border: none; padding: 20px; width: 100%; border-radius: 16px; cursor: pointer; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; transition: 0.3s; margin-top: 20px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="panel">
        <h1>👤 Surgical Identity Lock</h1>
        <div class="instruction">
            <strong>RECONSTRUCTION ERROR FIX:</strong><br>
            Ker kapa in očala skrivajo tvoj obraz, moraš AI-ju ročno definirati skrite dele. To bo preprečilo spreminjanje tvoje identitete.
        </div>

        <div class="group">
            <label>1. Detajli Oči (Skrito pod očali)</label>
            <input type="text" id="eyes" placeholder="npr. light hazel eyes, sharp gaze, natural eyelashes..." oninput="update()">
        </div>

        <div class="group">
            <label>2. Detajli Las (Skrito pod kapo)</label>
            <input type="text" id="hair" placeholder="npr. dark brown wavy hair, messy half-up bun..." oninput="update()">
        </div>

        <div class="group">
            <label>3. Protokol Čiščenja</label>
            <select id="cleaning" onchange="update()">
                <option value="SURGICAL REMOVAL: Strictly remove cap and glasses. Reconstruct forehead and eye area with 100% precision.">Odstrani Kapo & Očala (Surgical)</option>
                <option value="OBJECT REMOVAL: Keep the face as is, but remove the sports ball and medal from hands.">Odstrani samo Žogo & Medaljo</option>
            </select>
        </div>

        <div class="group">
            <label>4. Studijsko Ozadje</label>
            <select id="studio" onchange="update()">
                <option value="standing against a professional grey cyclorama wall">Professional Studio Grey</option>
                <option value="in a minimalist luxury apartment with soft window light">Natural Daylight Studio</option>
            </select>
        </div>

        <button class="btn-copy" onclick="copy()">📋 KOPIRAJ SURGICAL MASTER PROMPT</button>
        <button style="margin-top:15px; background:var(--home); color:white;" class="btn-copy" onclick="window.location.href='../index.html'">🏠 NAZAJ NA DASHBOARD</button>
    </div>
    <div class="output-box" id="out"></div>
</div>

<script>
    function update() {
        const eyes = document.getElementById('eyes').value || "natural eyes matching Ref 0";
        const hair = document.getElementById('hair').value || "original hair texture";
        const clean = document.getElementById('cleaning').value;
        const studio = document.getElementById('studio').value;

        const final = `MASTER SURGICAL RECONSTRUCTOR (V5.0 - IDENTITY FIX):

SLOJI 01-04 (Vsebina & DNA):
[IMAGE 0 LOCK]: Use Ref 0 as the master template for identity. 
[IDENTITY RECONSTRUCTION]: ${clean} 
[EYE DNA]: Reconstruct the eye area to show ${eyes}. Zero distortion.
[HAIR DNA]: Reconstruct the head area to show ${hair}. No headwear allowed.
[SCENE]: Located ${studio}.

SLOJ 05 (KAMERA): Shot on 35mm prime lens, tripod-mounted, subtle digital noise.

SLOJI 06-08 (TEHNIČNI): Professional studio lighting. Direct on-camera flash with soft-box fill. Harsh realistic shadows. Clean studio atmosphere.

SLOJ 09 (REALIZEM): Mandatory skin texture: visible pores, natural skin sheen. Strictly prohibit any new moles. Maintain the exact bone structure and jawline from Ref 0. No plastic skin, no CGI.

SLOJ 10 (VZDUŠJE): Professional reference asset shot. Spontaneous, raw production anchor.

NEGATIVE PROMPT: cap, hat, headwear, glasses, sunglasses, frames, ball, medal, ribbon, sports jersey, logo, branding, blurry eyes, deformed eyes, airbrushed, CGI, beauty filter, different face.`;

        document.getElementById('out').innerText = final;
    }
    function copy() { navigator.clipboard.writeText(document.getElementById('out').innerText); alert("SURGICAL PROMPT KOPIRAN!"); }
    update();
</script>
</body>
</html>
