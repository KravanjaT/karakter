<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>AI Universa - Master Dashboard</title>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --prod: #7c3aed; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .dashboard { background: white; padding: 50px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; max-width: 1000px; width: 90%; }
        h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 40px; font-weight: 900; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .module-card { 
            background: #f8fafc; border: 2px solid #e2e8f0; padding: 30px 15px; border-radius: 20px; 
            text-decoration: none; color: var(--primary); font-weight: 800; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .module-card:hover { border-color: var(--accent); transform: translateY(-5px); background: white; }
        .module-card.prod-card:hover { border-color: var(--prod); }
        .module-card span { font-size: 2.5rem; margin-bottom: 10px; }
        .footer { margin-top: 30px; color: #64748b; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="dashboard">
    <h1>AI UNIVERSA • PRO-SYSTEM</h1>
    <div class="grid">
        <a href="modules/male_module.html" class="module-card"><span>👨</span> MOŠKI</a>
        <a href="modules/female_module.html" class="module-card"><span>👩</span> ŽENSKE</a>
        <a href="modules/kids_module.html" class="module-card"><span>🧒</span> OTROCI</a>
        <a href="modules/production_module.html" class="module-card prod-card" style="background: #f5f3ff; border-color: #ddd6fe;">
            <span style="filter: grayscale(0);">🎬</span> PRODUKCIJA
        </a>
    </div>
    <div class="footer">STRICT REALISM PROTOCOL V90 • 2026</div>
</div>
</body>
</html>
