<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - Marketplace Delivery V2.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --primary: #0f172a; --accent: #eab308; --bg: #020617; --home: #64748b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; padding: 40px; margin: 0; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.1; pointer-events: none; z-index: 100; }
        .wrapper { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; z-index: 10; position: relative; }
        .panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; border: 1px solid rgba(234, 179, 8, 0.2); }
        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 900; margin-top: 0; }
        .instruction { background: rgba(234, 179, 8, 0.05); padding: 20px; border-radius: 16px; border-left: 4px solid var(--accent); margin-bottom: 25px; font-size: 0.8rem; color: #fde68a; }
        .niche-box { background: #1e293b; padding: 20px; border-radius: 18px; border: 1px solid #334155; margin-bottom: 25px; }
        label { display: block; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; letter-spacing: 1px; }
        select, input { width: 100%; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 0.9rem; }
        .output-box { background: #0f172a; color: #cbd5e1; padding: 30px; border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; height: 1100px; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; border: 1px solid #1e293b; position: sticky; top: 40px; }
        .btn-copy { background: var(--accent); color: #000; border: none; padding: 20px; width: 100%; border-radius: 16px; cursor: pointer; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; transition: 0.3s; margin-top: 20px; }
        .btn-copy:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(234, 179, 8, 0.3); }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="panel">
        <h1>📦 Delivery Marketplace</h1>
        <div class="instruction">
            <strong>DOUBLE LOCK PROTOCOL:</strong> [cite: 59, 183]<br>
            • REF 0: Character Identity Anchor<br>
            • REF 1: Product Anchor (Grafit, Krema, Pijača)
        </div>

        <div class="niche-box">
            <div class="group">
                <label>🎯 IZBERI NIŠO IZDELKA</label>
                <select id="niche" onchange="updateNiche()">
                    <option value="beauty">Beauty & Skin Care (Kreme/Serumi)</option>
                    <option value="cafe">Cafe & Coffee Culture (Kava/Pijače)</option>
                    <option value="urban">Urban & Streetwear (Oblačila/Grafiti)</option>
                    <option value="luxury">Luxury & Old Money (Nakit/Ure)</option>
                    <option value="tech">Tech & Innovation (Gadgeti)</option>
                    <option value="fitness">Fitness & Wellness (Šejki/Dodatki)</option>
                    <option value="home">Home & Interior (Lifestyle)</option>
                    <option value="travel">Travel & Adventure (Oprema)</option>
                    <option value="creative">Artistic & Creative (Platna/Barve)</option>
                    <option value="casual">Everyday Casual (Splošno)</option>
                </select>
            </div>
        </div>

        <h2>Okolje (Sloj 03)</h2>
        <div class="group">
            <label>Scena</label>
            <select id="scene" onchange="update()"></select>
        </div>

        <h2>Stiling (Sloj 04)</h2>
        <div class="group">
            <label>Oblačila</label>
            <select id="outfit" onchange="update()"></select>
        </div>
        <div class="group">
            <label>Obutev</label>
            <select id="footwear" onchange="update()"></select>
        </div>

        <h2>Akcija</h2>
        <div class="group">
            <label>Interakcija z izdelkom</label>
            <select id="action" onchange="update()">
                <option value="PRESENT: carefully presenting the specific product directly towards the camera with both hands">Predstavitev izdelka (Obe roki)</option>
                <option value="CANDID: holding the product naturally in one hand while looking relaxed and unbothered">Sproščeno držanje (Ena roka)</option>
                <option value="IN-USE: actively interacting with the product, showing natural skin tension and realistic grip">Aktivna uporaba (Detajli prstov)</option>
            </select>
        </div>

        <button class="btn-copy" onclick="copy()">📋 KOPIRAJ FINALNI PROMPT</button>
        <button style="margin-top:15px; background:var(--home); color:white;" class="btn-copy" onclick="window.location.href='index.html'">🏠 NAZAJ NA DASHBOARD</button>
    </div>
    <div class="output-box" id="out"></div>
</div>

            footwear: ["ORIGINAL: Keep footwear from Ref 0", "Everyday white low sneakers", "Casual leather sandals", "Comfortable flip-flops", "Canvas slip-on shoes", "Classic flat loafers", "Worn-in walking shoes", "Casual high sneakers", "Simple ballet flats", "Lightweight summer shoes"]

    };

    function updateNiche() {
        const niche = document.getElementById('niche').value;
        const data = NICHE_DATA[niche];
        const populate = (id, list) => {
            const el = document.getElementById(id);
            el.innerHTML = list.map(item => `<option value="${item}">${item}</option>`).join('');
        };
        populate('scene', data.scenes);
        populate('outfit', data.outfits);
        populate('footwear', data.footwear);
        update();
    }

    function update() {
        const sc = document.getElementById('scene').value;
        const out = document.getElementById('outfit').value;
        const foot = document.getElementById('footwear').value;
        const act = document.getElementById('action').value;

        // Cleanup prompt logic for "ORIGINAL"
        let scenePart = sc.includes("ORIGINAL") ? "AS SEEN IN REFERENCE IMAGES" : sc;
        let outfitPart = out.includes("ORIGINAL") ? "AS SEEN IN REFERENCE IMAGE 0" : out;
        let footwearPart = foot.includes("ORIGINAL") ? "AS SEEN IN REFERENCE IMAGE 0" : foot;

        const finalPrompt = `MASTER PRODUCTION PROMPT (V141 - HARD FACE LOCK):

SLOJI 01-03 (IDENTITETA — ABSOLUTNO NEDOTAKLJIVO):
[HARD FACE LOCK]: Reference Image 0 is the ONLY permitted face. Do NOT reinterpret, enhance, or alter any facial feature.
[BONE STRUCTURE LOCK]: 1:1 match of jawline width, nose shape, nose bridge width, cheekbone structure, and orbital depth from Ref 0. Zero deviation.
[NOSE LOCK]: Preserve EXACT nose shape from Ref 0 — do NOT narrow, refine, or slim the nose. Copy it pixel-for-pixel.
[EYE LOCK]: Preserve exact eye color, eye shape, and under-eye shadows from Ref 0.
[SKIN LOCK]: Do NOT smooth, slim, or beautify the face. Preserve all natural skin texture and asymmetry from Ref 0.
[IMAGE 1 LOCK]: Subject is holding the EXACT product/artwork from reference image 1. Zero changes to colors, text, or patterns.

SLOJ 04 (PRODUKCIJA):
[ACTION]: Subject is ${act}. 
[WARDROBE]: Wearing ${outfitPart} and ${footwearPart}.
[SCENE]: Located ${scenePart}.

SLOJ 05 (KAMERA): Shot on 28mm wide-angle lens, handheld shake, motion blur, digital noise for raw analog realism.

SLOJ 06-08 (TEHNIČNI): Lighting matched to ${scenePart}. Direct on-camera flash, harsh shadows. Atmosphere: visible dust particles. Dirty cinematic grading, heavy film grain, vignette.

SLOJ 09 (REALIZEM): Mandatory skin texture: visible pores, natural skin sheen from Ref 0. PROHIBIT any new moles or freckles. No plastic skin, no CGI, zero digital retouching.

SLOJ 10 (VZDUŠJE): Spontaneous, raw private moment, unposed production shot.

NEGATIVE PROMPT: slimmed face, narrowed nose, refined nose, beautified face, thinner jawline, perfect skin, airbrushed, CGI, 3D render, cartoon, doll-like, beauty filter, changed face, different person, new moles, extra freckles.`;

        document.getElementById('out').innerText = finalPrompt;
    }

    function copy() { navigator.clipboard.writeText(document.getElementById('out').innerText);
        btnFeedback(document.querySelector(".btn-copy")); }
    updateNiche();

function btnFeedback(btn) {
    const orig = btn.innerHTML;
    const origBg = btn.style.background || '';
    btn.innerHTML = '✅ KOPIRANO!';
    btn.style.background = '#10b981';
    btn.style.color = '#000';
    btn.disabled = true;
    setTimeout(() => {
        btn.innerHTML = orig;
        btn.style.background = origBg;
        btn.style.color = '';
        btn.disabled = false;
    }, 1500);
}
</script>
</body>
</html>
