<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>AI Universa - Master DNA Dashboard</title>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --success: #10b981; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Stranski meni */
        .sidebar { width: 300px; background: var(--primary); color: white; padding: 30px; display: flex; flex-direction: column; }
        .sidebar h1 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        
        .nav-btn { 
            background: transparent; border: 1px solid #334155; color: #cbd5e1; 
            padding: 15px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; 
            text-align: left; font-weight: 600; transition: 0.3s; display: flex; align-items: center;
        }
        .nav-btn:hover { background: #1e293b; color: white; border-color: var(--accent); }
        .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .nav-btn i { margin-right: 15px; font-style: normal; opacity: 0.7; }

        /* Glavni del za prikaz modulov */
        .main-content { flex-grow: 1; position: relative; display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        
        .info-bar { background: white; padding: 15px 30px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .protocol-badge { background: #f8fafc; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; color: #64748b; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>AI UNIVERSA</h1>
    
    <button class="nav-btn active" onclick="loadModule('modules/male_module.html', this)">
        <i>01</i> 📁 MAPA: MOŠKI
    </button>
    
    <button class="nav-btn" onclick="loadModule('modules/female_module.html', this)">
        <i>02</i> 📁 MAPA: ŽENSKE
    </button>
    
    <button class="nav-btn" onclick="loadModule('modules/kids_module.html', this)">
        <i>03</i> 📁 MAPA: OTROCI
    </button>

    <div style="margin-top: auto; font-size: 0.7rem; color: #64748b; line-height: 1.6;">
        © 2026 PROTOKOL REALIZMA<br>
        10-SLOJNI SISTEM PROMPTOV [cite: 12]<br>
        MODEL: NANO BANANA PRO
    </div>
</div>

<div class="main-content">
    <div class="info-bar">
        <div style="font-weight: 700; font-size: 0.9rem;" id="current-title">MAPA 01: MOŠKI (Identity Anchor)</div>
        <div class="protocol-badge">DIRECTOR MODE ACTIVE</div>
    </div>
    <iframe id="module-frame" src="modules/male_module.html"></iframe>
</div>

<script>
    function loadModule(url, btn) {
        // Posodobi iframe
        document.getElementById('module-frame').src = url;
        
        // Posodobi naslov
        const title = btn.innerText.replace(/^\d+\s+/, "");
        document.getElementById('current-title').innerText = title + " (Reference Anchor)";
        
        // Posodobi gumbe
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>

</body>
</html>
