<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - Character Director V4.7 PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --bg: #020617; --accent: #3b82f6; --panel: #0f172a; --text: #f8fafc; --green: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 40px; color: var(--text); margin: 0; }
        .wrapper { max-width: 1750px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; }
        .panel { background: var(--panel); padding: 40px; border-radius: 32px; border: 1px solid rgba(59, 130, 246, 0.4); position: sticky; top: 40px; }
        h1 { margin: 0 0 10px 0; font-size: 1.8rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        p.desc { color: #94a3b8; font-size: 0.85rem; margin-bottom: 25px; line-height: 1.5; }
        
        .selector-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        select { width: 100%; padding: 12px; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; cursor: pointer; font-weight: 700; }
        
        textarea { width: 100%; height: 120px; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; color: #fff; font-size: 1rem; margin-bottom: 20px; resize: none; box-sizing: border-box; }
        .orchestrate-btn { background: var(--accent); color: #fff; border: none; padding: 22px; width: 100%; border-radius: 16px; cursor: pointer; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; transition: 0.3s; }
        .orchestrate-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .output-box { background: #000; color: #93c5fd; padding: 40px; border-radius: 28px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; height: 90vh; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; border: 1px solid #1e293b; }
        .btn-home { background: rgba(100, 116, 139, 0.1); color: #94a3b8; border: 1px solid rgba(100, 116, 139, 0.2); padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; margin-top: 15px; }
        
        #toast { visibility: hidden; min-width: 250px; background-color: var(--green); color: #000; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 1000; left: 50%; transform: translateX(-50%); top: 30px; font-weight: 900; text-transform: uppercase; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }
    </style>
</head>
<body>

<div id="toast">DNA Paket Kopiran! 🧬</div>

<div class="wrapper">
    <div class="panel">
        <h1>🧬 Character Orchestrator</h1>
        <p class="desc">Združen kasting sistem. Izberi kategorijo in kadriranje, sistem pa bo samodejno povezal ustrezne DNA module.</p>
        
        <div class="selector-group">
            <div>
                <label style="font-size:0.6rem; color:#64748b; text-transform:uppercase; margin-bottom:5px; display:block;">Kategorija</label>
                <select id="category">
                    <option value="male">Moški (Male DNA)</option>
                    <option value="female">Ženska (Female DNA)</option>
                    <option value="child">Otrok (Child DNA)</option>
                </select>
            </div>
            <div>
                <label style="font-size:0.6rem; color:#64748b; text-transform:uppercase; margin-bottom:5px; display:block;">Kadriranje</label>
                <select id="framing">
                    <option value="waist">Waist Up</option>
                    <option value="full">Full Body</option>
                </select>
            </div>
        </div>

        <textarea id="vision" placeholder="Vnesi specifične detajle (npr. Azijski videz, pegice, kodrasti lasje...)"></textarea>
        
        <button class="orchestrate-btn" onclick="orchestrateDNA()">🚀 ORKESTRIRAJ DNA</button>
        <button class="btn-home" onclick="window.location.href='index.html'">🏠 DASHBOARD</button>
    </div>

    <div id="out" class="output-box">// Čakam na kasting parametre...</div>
</div>

<script>
    function orchestrateDNA() {
        const v = document.getElementById('vision').value;
        const cat = document.getElementById('category').value;
        const f = document.getElementById('framing').value;
        if (!v) return;

        const dnaData = {
            male: {
                traits: "rugged bone structure, visible stubble, sharp masculine jawline, expressive facial lines",
                polish: "emphasize skin texture and micro-hairs, maintain strong skeletal definition"
            },
            female: {
                traits: "elegant facial geometry, natural skin luster, refined feminine bone structure",
                polish: "emphasize subsurface light interaction, maintain soft but clear skin texture"
            },
            child: {
                traits: "soft facial proportions, large expressive eyes, delicate features, smooth natural transition",
                polish: "pure skin map without adult-like retouching, focus on youthful translucency and natural skin tones"
            }
        };

        const selected = dnaData[cat];
        const framingTask = f === 'waist' ? 'waist-up diagnostic headshot' : 'full-body standing diagnostic pose';

        let res = `MASTER DNA ORCHESTRATION - V4.7 (INTEGRATED SYSTEM)\n`;
        res += `CATEGORY: ${cat.toUpperCase()} | FRAMING: ${f.toUpperCase()}\n`;
        res += `DIRECTOR VISION: ${v.toUpperCase()}\n`;
        res += `===========================================================\n\n`;

        res += `KORAK 1: DNA STRIP (EXTRACTION)\n`;
        res += `[PROMPT]: STEP 1 — IDENTITY STRIP (V10.5):\n`;
        res += `[TASK]: Direct identity extraction of ${cat} subject: ${v}. ${selected.traits}.\n`;
        res += `[DNA LOCK]: 1:1 match of skeletal structure from Ref 0. ${f === 'full' ? 'Full anatomical proportions lock.' : ''}\n`;
        res += `[IMMUTABLE]: No added moles or freckles. 0% added pigmentation.\n`;
        res += `[LAYERS]: 28mm lens, handheld shake, sensor noise.\n`;
        res += `-----------------------------------------------------------\n\n`;

        res += `KORAK 2: MASTER MATCH (10-LAYER POLISH)\n`;
        res += `[PROMPT]: STEP 2 — AI DNA MATCH (V10.5):\n`;
        res += `[INPUT]: Cleaned Ref 0. [TASK]: Polish and seal identity for ${cat}.\n`;
        res += `[IDENTITY SEAL]: ${selected.polish}.\n\n`;
        res += `[FULL 10-LAYER SYSTEM EXECUTION]:\n`;
        res += `1-4: hyper-realistic, raw, candid photograph, non-posed.\n`;
        res += `5: 35mm lens, organic handheld shake, digital noise, chromatic aberration.\n`;
        res += `6-8: On-camera flash, harsh shadows, heavy film grain, ISO 400 noise.\n`;
        res += `9-10: Visible skin pores, natural imperfections, no retouching, private moment look.\n\n`;
        res += `[NEGATIVE PROMPT]: plastic skin, airbrushed, CGI, beauty filter, added blemishes.\n`;
        res += `===========================================================\n`;

        document.getElementById('out').innerText = res;
        navigator.clipboard.writeText(res);
        var x = document.getElementById("toast");
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 2000);
    }
</script>
</body>
</html>
