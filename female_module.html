<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>AI Universa - Ženski Modul (Mapa 02 - V67)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --bg: #020617; --panel: rgba(15,23,42,0.85); --accent: #3b82f6; --text: #f8fafc; --dim: #64748b; --border: rgba(255,255,255,0.08); --green: #10b981; --phase2: #7c3aed; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 30px; color: var(--text); margin: 0; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.1; pointer-events: none; z-index: 0; }
        .wrapper { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 30px; position: relative; z-index: 10; }
        .panel { background: var(--panel); backdrop-filter: blur(20px); padding: 35px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h2 { margin: 0 0 20px 0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--dim); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .group { margin-bottom: 15px; }
        label { display: block; font-weight: 800; font-size: 0.62rem; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; letter-spacing: 1px; }
        select { width: 100%; padding: 12px 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: rgba(0,0,0,0.4); color: var(--text); font-size: 0.88rem; cursor: pointer; font-family: 'Inter', sans-serif; appearance: none; }
        select:focus { outline: none; border-color: var(--accent); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .checkbox-area { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border: 1px solid var(--border); }
        .check-item { display: flex; align-items: center; font-size: 0.78rem; font-weight: 600; cursor: pointer; color: #cbd5e1; }
        .check-item input { width: 16px; height: 16px; margin-right: 10px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
        .output { background: #000; color: #10b981; padding: 30px; border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; height: 1050px; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; border: 1px solid #1e293b; position: sticky; top: 20px; }
        .btn-copy { background: var(--green); color: #000; border: none; padding: 18px; width: 100%; border-radius: 14px; cursor: pointer; font-size: 1rem; font-weight: 900; margin-top: 20px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(16,185,129,0.25); }
        .btn-copy:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(16,185,129,0.35); }
        .btn-phase2 { background: var(--phase2); color: white; border: none; padding: 18px; width: 100%; border-radius: 14px; cursor: pointer; font-size: 1rem; font-weight: 900; margin-top: 12px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 4px 14px rgba(124,58,237,0.25); }
        .btn-phase2:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,58,237,0.4); }
        .btn-home { background: rgba(100,116,139,0.1); color: #94a3b8; border: 1px solid rgba(100,116,139,0.2); padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; margin-top: 12px; transition: 0.3s; letter-spacing: 1px; }
        .btn-home:hover { background: rgba(100,116,139,0.25); color: #f1f5f9; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="panel">
        
        
        <div class="grid">
            <div class="group">
                <label>1. Starost (DNA biometrija)</label>
                <select id="age" onchange="update()">
                    <option value="18">18 let (Mladostnica)</option>
                    <option value="22">22 let (Mlada odrasla)</option>
                    <option value="28">28 let (Zrela mladost)</option>
                    <option value="35">35 let (Srednja leta)</option>
                    <option value="45">45 let (Zrela doba)</option>
                    <option value="55">55 let (Zrela odraslost)</option>
                    <option value="75">75 let (Senior)</option>
                </select>
            </div>
            <div class="group">
                <label>2. Poreklo (Ethnicity)</label>
                <select id="origin" onchange="update()">
                    <option value="European (Slavic) heritage, pale cool-toned skin">Slovansko</option>
                    <option value="European (Nordic) heritage, fair porcelain skin">Nordijsko</option>
                    <option value="Mediterranean (Spanish/Italian) heritage, olive skin">Mediteransko</option>
                    <option value="Latin American (Brazilian) heritage, bronze skin">Latino / Brazilsko</option>
                    <option value="African heritage, deep ebony skin">Afriško</option>
                    <option value="Middle Eastern heritage, warm amber skin">Arabsko</option>
                    <option value="East Asian heritage, smooth ivory skin">Azijsko</option>
                    <option value="South Asian (Indian) heritage, warm brown skin">Indijsko</option>
                </select>
            </div>
        </div>

        <div class="group">
            <label>3. Postava (Ženska slovnica)</label>
            <select id="body" onchange="update()">
                <option value="slender, model-like lean build">Vitka</option>
                <option value="athletic, toned and fit physique">Atletska</option>
                <option value="average, natural feminine build">Običajna</option>
                <option value="curvy plus-size natural build">Močnejša</option>
            </select>
        </div>

        <div class="group">
            <label>4. Unikatne poteze obraza (Obrazna DNA)</label>
            <div class="grid">
                <select id="nose" onchange="update()">
                    <option value="straight refined nose">Raven nos</option>
                    <option value="small button nose">Majhen "gumbek" nos</option>
                    <option value="slightly aquiline nose">Orlovski nos</option>
                    <option value="wide natural nose bridge">Širši koren nosu</option>
                </select>
                <select id="lips" onchange="update()">
                    <option value="natural full lips">Polne ustnice</option>
                    <option value="thin refined lips">Tanke ustnice</option>
                    <option value="prominent cupid's bow lips">Izrazit Kupidov lok</option>
                    <option value="wide expressive mouth">Široka usta</option>
                </select>
            </div>
            <div style="margin-top:10px;">
                <select id="faceShape" onchange="update()">
                    <option value="oval face with high cheekbones">Ovalen obraz (Visoke ličnice)</option>
                    <option value="heart-shaped face, soft jawline">Srčast obraz</option>
                    <option value="square face, defined strong jaw">Kvadraten obraz</option>
                    <option value="round face, youthful fullness">Okrogel obraz</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div class="group">
                <label>5. Barva Las (Prave Blondinke & več)</label>
                <select id="hColor" onchange="update()">
                    <option value="natural golden blonde">Zlato blond (Prava)</option>
                    <option value="light ash blonde">Pepelnato blond</option>
                    <option value="dirty ash blonde">Umazano blond</option>
                    <option value="strawberry blonde">Jagodna blond</option>
                    <option value="dark espresso brown">Temno rjava</option>
                    <option value="natural chestnut brown">Kostanjeva rjava</option>
                    <option value="light honey brown">Svetlo rjava</option>
                    <option value="natural ginger red">Rdeča / Bakrena</option>
                    <option value="jet black">Črna</option>
                    <option value="silver fox grey">Srebrno siva</option>
                    <option value="pure white">Bela</option>
                </select>
            </div>
            <div class="group">
                <label>6. Pričeska (Razširjeni stili)</label>
                <select id="hStyle" onchange="update()">
                    <option value="long sleek straight hair">Dolgi ravni</option>
                    <option value="long natural beach waves">Dolgi valoviti</option>
                    <option value="medium layered lob with bangs">Srednji stopničasti</option>
                    <option value="sleek chin-length bob cut">Kratki paž (Bob)</option>
                    <option value="high messy bun with loose strands">Sproščena figa</option>
                    <option value="tight box braids">Kitke (Box braids)</option>
                    <option value="voluminous high ponytail">Visok čop</option>
                    <option value="short textured pixie cut">Kratka pixie</option>
                    <option value="natural afro coils">Afro</option>
                    <option value="groomed long dreadlocks">Dredi</option>
                </select>
            </div>
        </div>

        <div class="group">
            <label>7. Garderoba (Textile & Style Expansion)</label>
            <select id="cloth" onchange="update()">
                <option value="premium heavy cotton crew-neck t-shirt">Bombažna majica (Heavy cotton)</option>
                <option value="minimalist rib-knit wool sweater">Rebrast pulover (Wool)</option>
                <option value="classic linen button-down shirt">Lanena srajca (Linen)</option>
                <option value="oversized structured wool-blend blazer">Oversized suknjič (Blazer)</option>
                <option value="vintage distressed leather biker jacket">Usnjena jakna (Leather)</option>
                <option value="soft cashmere V-neck sweater">Kašmir pulover (Cashmere)</option>
                <option value="silk slip dress with thin straps">Svilena obleka (Silk dress)</option>
                <option value="oversized heavyweight fleece hoodie">Hoodie (Fleece)</option>
                <option value="classic cotton gabardine trench coat">Plašč (Trench coat)</option>
            </select>
        </div>

        <div class="grid">
            <div class="group">
                <label>8. Barva oblačil (Quiet Luxury)</label>
                <select id="cC" onchange="update()">
                    <option value="off-white">Bela (Off-white)</option>
                    <option value="charcoal grey">Temno siva</option>
                    <option value="black">Črna</option>
                    <option value="navy blue">Mornarsko modra</option>
                    <option value="cream beige">Kremna / Bež</option>
                    <option value="taupe">Taupe</option>
                    <option value="dusty rose">Umazano roza</option>
                </select>
            </div>
            <div class="group">
                <label>9. Ličila (Sloj 09 Realizem)</label>
                <select id="makeup" onchange="update()">
                    <option value="no-makeup natural look, raw skin texture">Brez ličil (Raw)</option>
                    <option value="barely-there natural makeup, highlighting skin pores">Komaj opazna (Barely-there)</option>
                    <option value="minimalist daily makeup, subtle mascara">Dnevna ličila</option>
                    <option value="lived-in smudged eyeliner, realistic raw aesthetic">Vživeta (Smudged)</option>
                    <option value="soft matte lipstick, natural tones">Matirane ustnice</option>
                </select>
            </div>
        </div>

        <div class="group grid">
            <div>
                <label>10. Barva Oči</label>
                <select id="eyes" onchange="update()">
                    <option value="deep chocolate brown eyes">Rjave (Temne)</option>
                    <option value="light hazel brown eyes">Rjave (Hazel)</option>
                    <option value="piercing crystalline blue eyes">Modre</option>
                    <option value="soft emerald green eyes">Zelene</option>
                    <option value="warm amber eyes">Jantarne</option>
                </select>
            </div>
            <div>
                <label>11. Dodatki</label>
                <select id="acc" onchange="update()">
                    <option value="no jewelry">Brez dodatkov</option>
                    <option value="large gold hoop earrings">Uhani (Obroči)</option>
                    <option value="minimalist gold stud earrings">Uhani (Pripeti)</option>
                    <option value="delicate gold chain necklace">Zlata verižica</option>
                    <option value="small silver nose ring">Nosni obroček</option>
                    <option value="minimalist wrist tattoo">Tatu na zapestju</option>
                    <option value="elaborate sleeve tattoo">Tatu na roki (Sleeve)</option>
                </select>
            </div>
        </div>

        <label>12. Realistični Detajli (Sloj 09)</label>
        <div class="checkbox-area">
            <label class="check-item"><input type="checkbox" class="tr" value="heavy freckles" onchange="update()"> Pegice</label>
            <label class="check-item"><input type="checkbox" class="tr" value="wearing minimalist optical glasses" onchange="update()"> Očala</label>
            <label class="check-item"><input type="checkbox" class="tr" value="visible dental braces" onchange="update()"> Zobni aparat</label>
            <label class="check-item"><input type="checkbox" class="tr" value="natural skin redness" onchange="update()"> Rdečica</label>
            <label class="check-item"><input type="checkbox" class="tr" value="tiny realistic skin mole" onchange="update()"> Znamenje</label>
        </div>

        <button class="btn-copy" onclick="copy()">📋 KOPIRAJ ŽENSKI MASTER PROMPT</button>

        <button class="btn-phase2" onclick="window.location.href='production_module.html'">POJDI NA FAZO 2 ➜</button>
        <button class="btn-home" onclick="window.location.href='index.html'">🏠 NAZAJ DOMOV</button>

    </div>

    <div class="output" id="out"></div>
</div>

<script>
    function update() {
        const aV = document.getElementById('age').value;
        const o = document.getElementById('origin').value;
        const b = document.getElementById('body').value;
        const n = document.getElementById('nose').value;
        const l = document.getElementById('lips').value;
        const f = document.getElementById('faceShape').value;
        const hC = document.getElementById('hColor').value;
        const hS = document.getElementById('hStyle').value;
        const mk = document.getElementById('makeup').value;
        const e = document.getElementById('eyes').value;
        const ac = document.getElementById('acc').value;
        const cl = document.getElementById('cloth').value;
        const cC = document.getElementById('cC').value;

        // AGE DNA LOGIC 
        let ageDetail = ""; let skinDNA = "";
        if(aV === "18") { ageDetail = "juvenile facial structure, high skin elasticity, soft feminine features"; skinDNA = "soft radiant skin, high skin bloom, zero dynamic wrinkles"; }
        else if(aV === "22") { ageDetail = "developing mature bone structure, youthful radiant glow, defined jawline"; skinDNA = "healthy skin sheen, visible pores, natural subsurface scattering"; }
        else if(aV === "28") { ageDetail = "refined facial definition, professional polish, subtle laugh lines"; skinDNA = "detailed skin texture, minor imperfections, no retouching"; }
        else if(aV === "35") { ageDetail = "early maturity, subtle dynamic eye-lines, established presence"; skinDNA = "fine lines starting to appear, realistic pores, uneven tone"; }
        else if(aV === "45") { ageDetail = "visible nasolabial folds, slight loss of elasticity, character lines"; skinDNA = "pronounced pores, realistic skin texture, character spots"; }
        else if(aV === "55") { ageDetail = "defined rhytids, elegant aging, mature feminine presence"; skinDNA = "solar lentigines (age spots), slight skin laxity, weathered texture"; }
        else if(aV === "75") { ageDetail = "deep authentic wrinkles, aged weathered structure, arcus senilis ring in eyes"; skinDNA = "thinned epidermal layer, authentic deep rhytids, solar lentigines"; }

        const traits = Array.from(document.querySelectorAll('.tr:checked')).map(t => t.value).join(', ');
        const details = traits ? `, with ${traits}` : "";
        const mStr = (mk !== 'no-makeup natural look, raw skin texture') ? `, featuring ${mk}` : "";
        const aStr = (ac !== 'no jewelry') ? `, wearing ${ac}` : "";

        const final = `PROMPT:
Layer 01-04 (Content): Ultra-photorealistic raw **waist up medium shot** identity reference anchor. Subject: a ${aV}-year old woman of ${o}. Facial DNA: ${f}, ${n}, ${l}. Characteristics: ${b}, ${e}, ${ageDetail}, ${hC} hair in a ${hS}${details}${mStr}${aStr}. Outfit: Wearing a ${cC} ${cl} with visible fabric weave and texture detail. Framing: Three-quarter view (3/4 perspective), 45-degree angle. Scenery: Neutral flat minimalist studio grey background.

Layer 05 (Camera): Shot on 85mm f/2.8 prime lens for realistic portrait compression, handheld, ISO 400 natural grain profile.

Layers 06-08 (Technical): High-key studio fill light, flat even illumination, direct fill flash. No dramatic shadows. Clean air, absolute clarity, zero haze. Natural cinematic grading.

Layer 09 (Realism): Mandatory skin texture: ${skinDNA}, visible pores, realistic asymmetry, zero retouching. No plastic, CGI, or doll-like skin.

Layer 10 (Atmosphere): Spontaneous, unposed identity reference.

NEGATIVE PROMPT: makeup on men, smoke, fog, haze, dramatic side lighting, high contrast, profile view, full body, back view, airbrushed, CGI, symmetric, beauty filter.`;

        document.getElementById('out').innerText = final;
    }

    function copy() {
        navigator.clipboard.writeText(document.getElementById('out').innerText);
        btnFeedback(document.querySelector(".btn-copy"));
    }
    update();

function btnFeedback(btn) {
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ COPIED!';
    btn.style.background = '#10b981';
    btn.style.color = '#000';
    btn.disabled = true;
    setTimeout(() => {
        btn.innerHTML = orig;
        btn.style.background = '';
        btn.style.color = '';
        btn.disabled = false;
    }, 1500);
}
</script>
</body>
</html>
