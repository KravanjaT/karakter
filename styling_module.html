<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - V150 PURE TRANSFER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --bg: #020617; --accent: #f43f5e; --panel: #0f172a; --text: #f8fafc; --green: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 40px; color: var(--text); margin: 0; }
        .wrapper { max-width: 1750px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .panel { background: var(--panel); padding: 40px; border-radius: 32px; border: 1px solid rgba(244, 63, 94, 0.2); }
        .header { margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .badge { background: var(--accent); color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        h1 { margin: 15px 0 5px 0; font-size: 1.8rem; font-weight: 900; }
        .shot-selector { display: flex; gap: 10px; margin-bottom: 30px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 20px; }
        .shot-type { flex: 1; padding: 15px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; }
        .shot-type.active { background: var(--accent); color: white; border-color: var(--accent); }
        h2 { font-size: 0.75rem; text-transform: uppercase; color: #64748b; margin: 25px 0 10px 0; letter-spacing: 1px; }
        select { width: 100%; padding: 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; background: #1e293b; color: #fff; font-size: 0.95rem; margin-bottom: 15px; }
        .output-box { background: #000; color: var(--green); padding: 35px; border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; height: 90vh; overflow-y: auto; white-space: pre-wrap; line-height: 1.8; border: 1px solid #1e293b; position: sticky; top: 40px; }
        .btn-copy { background: var(--accent); color: white; border: none; padding: 22px; width: 100%; border-radius: 16px; cursor: pointer; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; }
        .btn-home { background: rgba(100, 116, 139, 0.1); color: #94a3b8; border: 1px solid rgba(100, 116, 139, 0.2); padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; margin-top: 15px; }
        .btn-home:hover { background: rgba(100, 116, 139, 0.25); color: #f1f5f9; }
        .lock-status { font-size: 0.65rem; color: #3b82f6; font-weight: 900; margin-top: 10px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="panel">
        <div class="header">
            <span class="badge">V150 • Pure Identity Transfer</span>
            <h1>🎭 Produkcijski Stajling</h1>
            <div class="lock-status">● IDENTITY BYPASS ENABLED (Use Pre-Processed Asset)</div>
        </div>

        <h2>1. KAJ PRENAŠAMO?</h2>
        <div class="shot-selector">
            <div id="type-face" class="shot-type active" onclick="setShotType('face')">Head Asset</div>
            <div id="type-full" class="shot-type" onclick="setShotType('full')">Body Asset</div>
        </div>

        <h2>2. TRŽNA NIŠA</h2>
        <select id="niche" onchange="updateUI()"></select>

        <h2>3. DINAMIČNI ELEMENTI</h2>
        <div class="group"><label>Oblačila</label><select id="outfit" onchange="updatePrompt()"></select></div>
        <div id="footwear-group" class="group"><label>Obutev</label><select id="footwear" onchange="updatePrompt()"></select></div>
        <div class="group"><label>Okolje</label><select id="scene" onchange="updatePrompt()"></select></div>
        <div class="group"><label>Akcija</label><select id="object" onchange="updatePrompt()"></select></div>

        <button class="btn-copy" onclick="copy()">🚀 KOPIRAJ PRODUCTION PROMPT</button>
        <button class="btn-home" onclick="window.location.href='index.html'">🏠 NAZAJ NA DASHBOARD</button>
    </div>

    <div class="output-box" id="out"></div>
</div>

<script>
    let currentShotType = 'face';
    const DATA = {
        face: {
            business: { outfits: ["Structured wool blazer", "Silk shirt collar", "Minimalist turtleneck"], scenes: ["Blurred financial district", "Modern elevator", "Rooftop glass office"], objects: ["Adjusting a metal watch", "Holding a steaming ceramic cup", "Checking a phone"] },
            luxury: { outfits: ["Heavy silk robe", "Velvet dinner jacket", "Cashmere scarf"], scenes: ["Private jet interior", "Exclusive members club", "Penthouse balcony"], objects: ["Swirling whiskey", "Holding a champagne flute", "Adjusting an earring"] },
            fitness: { outfits: ["Gym hoodie", "Technical compression top", "Performance headband"], scenes: ["Industrial gym", "Urban running path", "Misty forest light"], objects: ["Drinking water", "Checking a smartwatch", "Adjusting earbuds"] },
            urban: { outfits: ["Graphic hoodie", "Raw denim jacket", "Urban utility vest"], scenes: ["Neon alleyway", "Subway platform", "Concrete rooftop"], objects: ["Holding coffee cup", "Scrolling on phone", "Using film camera"] },
            home: { outfits: ["Cashmere sweater", "Silk pajama top", "Messy morning robe"], scenes: ["Sun-filled bedroom", "Kitchen with steam", "Cozy reading nook"], objects: ["Holding a mug", "Reading a book", "Touching hair"] }
        },
        full: {
            business: { outfits: ["Full pinstripe tailored suit", "Wool overcoat over suit", "Corporate chinos & blazer"], footwear: ["Polished Oxfords", "Suede Chelsea boots", "Leather loafers"], scenes: ["Modernist office lobby", "Rainy financial district", "Rooftop terrace"], objects: ["Walking with a briefcase", "Holding a laptop sleeve", "Leaning on a glass wall"] },
            luxury: { outfits: ["Full bespoke summer suit", "Elegant evening gown", "Cashmere long coat"], footwear: ["Designer mules", "Gold-buckle loafers", "Bespoke evening boots"], scenes: ["Private yacht deck", "Luxury hotel balcony", "Marble staircase"], objects: ["Tossing car keys", "Holding a designer clutch", "Opening a heavy car door"] },
            fitness: { outfits: ["Full compression set", "Oversized training hoodie", "Technical windbreaker"], footwear: ["Lifting shoes", "Carbon trainers", "Muddy trail boots"], scenes: ["Empty stadium stairs", "Industrial CrossFit box", "Mountain path"], objects: ["Carrying a kettlebell", "Holding a yoga mat", "Stretching against a wall"] },
            urban: { outfits: ["Techwear cargo set", "Distressed denim outfit", "Graphic tracksuit"], footwear: ["Limited high-tops", "Platform combat boots", "Retro trainers"], scenes: ["Subway platform", "Skatepark", "Busy street market"], objects: ["Carrying a skateboard", "Wearing a backpack", "Walking with an umbrella"] },
            home: { outfits: ["Full cashmere lounge set", "Silk pajamas set", "Heavy knit robe"], footwear: ["Sheepskin slippers", "Knitted socks", "Barefoot on wood"], scenes: ["Minimalist kitchen", "Living room with fire", "Morning bedroom"], objects: ["Carrying breakfast tray", "Watering house plant", "Opening a window"] }
        }
    };

    function setShotType(type) {
        currentShotType = type;
        document.getElementById('type-face').classList.toggle('active', type === 'face');
        document.getElementById('type-full').classList.toggle('active', type === 'full');
        document.getElementById('footwear-group').style.display = type === 'full' ? 'block' : 'none';
        const nicheSelect = document.getElementById('niche');
        nicheSelect.innerHTML = Object.keys(DATA[type]).map(n => `<option value="${n}">${n.toUpperCase()}</option>`).join('');
        updateUI();
    }

    function updateUI() {
        const niche = document.getElementById('niche').value;
        const data = DATA[currentShotType][niche];
        const populate = (id, list) => {
            document.getElementById(id).innerHTML = list.map(item => `<option value="${item}">${item}</option>`).join('');
        };
        populate('outfit', data.outfits);
        populate('scene', data.scenes);
        populate('object', data.objects);
        if(currentShotType === 'full') populate('footwear', data.footwear);
        updatePrompt();
    }

    function updatePrompt() {
        const out = document.getElementById('outfit').value;
        const sc = document.getElementById('scene').value;
        const obj = document.getElementById('object').value;
        const foot = currentShotType === 'full' ? ` and ${document.getElementById('footwear').value}` : '';
        
        const transferRef = currentShotType === 'face' 
            ? "[HEAD DNA TRANSFER]: Use Reference Image 0 as a PRE-PROCESSED, FINAL asset. 0% alteration to facial features, skin markers, or bone structure."
            : "[ANATOMICAL TRANSFER]: Use Reference Image 0 as the absolute skeletal template. 1:1 match of height, shoulder width, and overall silhouette.";

        const final = `MASTER PRODUCTION PROMPT (V150 - PURE TRANSFER MODE):

Sloji 1-3 (Identiteta - NEDOTAKLJIVO):
[IMMUTABLE ASSET]: Reference Image 0 is the FINAL processed identity. Do NOT re-process or enhance.
${transferRef}
[PIXEL INTEGRITY]: Preserve 1:1 original identity from Ref 0. Identity is isolated from the style change.

Sloji 4-7 (Produkcija & Wardrobe):
[WARDROBE OVERLAY]: Subject is now wearing ${out}${foot}. Material physics must be realistic.
[ENVIRONMENT]: ${sc}. Global lighting must wrap around the subject from Ref 0 without altering their DNA.
[ACTION/INTERACTION]: Subject is ${obj}. 

Sloji 8-10 (Kamera & Optika):
Shot on 35mm f/2.8 lens. Subtle cinematic noise. 
Strictly match skin tone and existing texture from Ref 0. 
Zero digital retouching on the person.

NEGATIVE PROMPT: added moles, added freckles, changed face, face enhancement, skin smoothing, beauty filter, different person, hybrid identity, airbrushed skin, CGI appearance.`;

        document.getElementById('out').innerText = final;
    }

    function copy() {
        navigator.clipboard.writeText(document.getElementById('out').innerText);
        alert("PRODUCTION PROMPT KOPIRAN! 🚀");
    }

    setShotType('face');
</script>
</body>
</html>
