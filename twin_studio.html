<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - Master Asset Studio V10.4 PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');

        :root { --bg: #020617; --accent: #22d3ee; --strip: #06b6d4; --match: #a855f7; --refine: #10b981; --home: #64748b; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 40px;
            margin: 0;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 40px;
            position: relative;
            z-index: 10;
        }

        .panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            padding: 40px;
            border-radius: 32px;
            border: 1px solid rgba(34, 211, 238, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            margin: 0 0 8px 0;
            font-size: 1.4rem;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 25px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
        }

        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.4);
            padding: 8px;
            border-radius: 18px;
        }

        .type-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.75rem;
            border: 1px solid transparent;
            color: #94a3b8;
        }

        .type-btn.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 4px 15px rgba(34, 211, 238, 0.3);
        }

        .step {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
        }

        .step-badge {
            font-size: 0.65rem;
            font-weight: 900;
            padding: 5px 12px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .badge-strip { background: var(--strip); color: #000; }
        .badge-match { background: var(--match); color: #fff; }

        .step-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tag {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e1;
        }

        .tag.keep { border-color: rgba(16,185,129,0.3); color: #6ee7b7; }

        .btn {
            width: 100%;
            border: none;
            padding: 18px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-strip { background: var(--strip); color: #000; box-shadow: 0 4px 20px rgba(6, 182, 212, 0.2); }
        .btn-match { background: var(--match); color: #fff; box-shadow: 0 4px 20px rgba(168, 85, 247, 0.2); }
        .btn-strip:hover, .btn-match:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .btn-home {
            background: rgba(100, 116, 139, 0.1);
            color: #94a3b8;
            border: 1px solid rgba(100,116,139,0.2);
            margin-top: 25px;
            padding: 15px;
            font-size: 0.85rem;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
        }

        .output-box {
            background: #000;
            color: #cbd5e1;
            padding: 35px;
            border-radius: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            height: 90vh;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.8;
            border: 1px solid rgba(34, 211, 238, 0.1);
            position: sticky;
            top: 40px;
        }

        .highlight-strip { color: #06b6d4; font-weight: 800; }
        .highlight-match { color: #a855f7; font-weight: 800; }
        .highlight-lock  { color: #10b981; font-weight: 800; }
        .highlight-neg   { color: #f87171; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="panel">
        <h1>🧬 Identity Translation</h1>
        <div class="subtitle">DIGITAL TWIN STUDIO // V10.4 PRO</div>

        <div class="type-selector">
            <div id="btn-face" class="type-btn active" onclick="setType('face')">Face DNA (Headshot)</div>
            <div id="btn-body" class="type-btn" onclick="setType('body')">Anatomical DNA (Full Body)</div>
        </div>

        <div class="step">
            <div class="step-header">
                <span class="step-badge badge-strip">Korak 1</span>
                <span style="font-weight:900; text-transform:uppercase;">Identity Extraction</span>
            </div>
            <div class="step-tags">
                <span class="tag">✕ Motnje</span><span class="tag">✕ Očala</span><span class="tag keep">✓ Facial DNA</span><span class="tag keep">✓ Vivid Skin Tone</span>
            </div>
            <button class="btn btn-strip" id="btn-strip" onclick="showAndCopy('strip')">✂️ KOPIRAJ STRIP PROMPT</button>
        </div>

        <div class="step">
            <div class="step-header">
                <span class="step-badge badge-match">Korak 2</span>
                <span style="font-weight:900; text-transform:uppercase;">AI Match & Polish</span>
            </div>
            <div class="step-tags">
                <span class="tag keep">✓ DNA Locked</span><span class="tag keep">✓ Pigment Locked</span><span class="tag">✓ Cinematic Color</span>
            </div>
            <button class="btn btn-match" id="btn-match" onclick="showAndCopy('match')">🔒 KOPIRAJ AI MATCH PROMPT</button>
        </div>

        <button class="btn btn-home" onclick="window.location.href='index.html'">🏠 NAZAJ NA DASHBOARD</button>
    </div>

    <div class="output-box" id="out"><span style="color:#1e293b;">// Master Asset Studio pripravljen...</span></div>
</div>

<script>
    let currentType = 'face';

    const DATA = {
        face: {
            strip: {
                label: "STEP 1 — FACE IDENTITY STRIP (V10.4)",
                text: `STEP 1 — IDENTITY STRIP (V10.4):

Sloji 01-04 (Vsebina & Izolacija):
[INPUT]: Real-life raw photograph (Ref 0).
[TASK]: Precise deconstruction of facial identity.
[IMMUTABLE SKIN DNA]: Do NOT add moles, freckles, or skin spots. Preserve ONLY original pigment distribution.
[COLOR FIDELITY]: Maintain 100% natural skin tones and accurate color saturation. No grayscale, no desaturation.

Sloj 05 (Kamera): 
28mm/35mm lens, handheld shake, motion blur, digital noise, chromatic aberration.

Sloji 06-08 (Tehnični):
On-camera flash, harsh shadows. 85mm prime equivalent perspective for clarity.
[REMOVAL]: Remove ALL glasses, eyewear, hats. Replace clothing with simple white tee.

Sloji 09-10 (Realizem):
Visible pores, natural imperfections, no retouching. [DNA LOCK]: Absolute match on bone structure from Ref 0.

NEGATIVE PROMPT: black and white, grayscale, desaturated, glasses, eyewear, freckles, moles, skin spots, added blemishes, smiling, airbrushed.`
            },
            match: {
                label: "STEP 2 — AI MATCH / MASTER POLISH (V10.4)",
                text: `STEP 2 — AI DNA MATCH & MASTER POLISH (V10.4):

Sloj 01-04 (Identiteta & DNA Sidro — NE SPREMINJAJ OBRAZA):
[INPUT]: Cleaned base image from Step 1 (Ref 0).
[IMMUTABLE SKIN MAP — ABSOLUTE]: Do NOT generate or add new moles, freckles, pigment spots, or skin marks. 
[SKIN PROTOCOL]: 100% focus on subsurface light interaction and 8K pore structure.
[COLOR]: Rich cinematic color grading, vibrant natural skin tones.

[DNA LOCK — ABSOLUTE]:
- Match facial geometry and bone structure from Ref 0 exactly.
- Keep eye shape and brow height identical.

Sloj 05 (Kamera):
35mm prime lens feel. Heavy film grain, chromatic aberration, digital sensor noise.

Sloji 06-08 (Tehnični):
On-camera flash style lighting. Cinematic sensor response.
[AI-NATIVE PRO UPGRADE]: 8K skin luster, healthy living sheen, luminous eyes.

Sloji 09-10 (Realizem):
Zero digital retouching. Visible pores. Natural facial asymmetry. 
NEGATIVE PROMPT: grayscale, desaturated, freckles, moles, skin spots, pigment marks, added blemishes, glasses, changed bone structure, plastic skin, CGI, 3D render.`
            }
        },
        body: {
            strip: {
                label: "STEP 1B — FULL BODY ANATOMICAL LOCK (V10.4)",
                text: `STEP 1B — FULL BODY ANATOMICAL LOCK (V10.4):

Sloji 01-04 (Anatomija & Proporci):
[INPUT]: Full-body raw photograph (Ref 0).
[SKIN PRESERVATION]: No new moles or freckles on body or face. 100% color accuracy.
[ANATOMY LOCK]: Maintain 1:1 height, shoulder width, and skeletal silhouette from Ref 0.

Sloj 05 (Kamera):
35mm lens, handheld shake, motion blur, digital noise, chromatic aberration.

Sloji 06-10 (Tehnični & Realizem):
On-camera flash, harsh shadows. [REMOVAL]: Replace clothes with white tee and dark trousers. Remove glasses.
0% added skin blemishes. Lived-in, non-posed stance.

NEGATIVE PROMPT: black and white, grayscale, glasses, eyewear, freckles, moles, skin spots, changed height, beauty filter.`
            },
            match: {
                label: "STEP 2B — SKELETAL DNA MATCH (V10.4)",
                text: `STEP 2B — SKELETAL DNA MATCH / CONSTITUTION LOCK (V10.4):

Sloj 01-04 (Identiteta & Poliranje):
[INPUT]: Cleaned anatomical blueprint from Step 1B (Ref 0).
[IMMUTABLE PIGMENT LOCK]: Do NOT add new moles, freckles, or spots.
[COLOR]: Cinematic grading, heavy film grain, vignette. Vibrant authentic colors.

Sloj 05 (Kamera):
35mm lens. Handheld shake, digital noise.

Sloji 06-10 (Realizem):
[SKELETAL LOCK]: Absolute lock on proportions from Ref 0.
[SKIN]: 8K pore detail, subsurface scattering for living skin. Zero retouching.

NEGATIVE PROMPT: grayscale, desaturated, freckles, moles, skin spots, pigment marks, body weight change, plastic skin, different person.`
            }
        }
    };

    function setType(type) {
        currentType = type;
        document.getElementById('btn-face').className = 'type-btn' + (type === 'face' ? ' active' : '');
        document.getElementById('btn-body').className = 'type-btn' + (type === 'body' ? ' active' : '');
        
        if(type === 'body') {
            document.getElementById('out').innerHTML = '<span style="color:#10b981;">// Anatomski Studio pripravljen... (Color Mode: ON)</span>';
        } else {
            document.getElementById('out').innerHTML = '<span style="color:#10b981;">// Face DNA Studio pripravljen... (Color Mode: ON)</span>';
        }
    }

    function showAndCopy(step) {
        const p = DATA[currentType][step];
        const colorClass = step === 'strip' ? 'highlight-strip' : 'highlight-match';

        let rendered = p.text
            .replace(/(STEP \d+[B]* —[^\n]+)/g, `<span class="${colorClass}">$1</span>`)
            .replace(/(Sloj[i]* \d+[^\n]*:)/g, '<span style="color:#f8fafc; font-weight:800; border-bottom:1px solid #1e293b;">$1</span>')
            .replace(/(\[IMMUTABLE[^\]]*\]|\[DNA LOCK[^\]]*\]|\[SKELETAL LOCK[^\]]*\]|\[ANATOMY LOCK[^\]]*\]|\[SKIN PROTOCOL[^\]]*\]|\[SKIN PRESERVATION[^\]]*\]|\[IMMUTABLE PIGMENT LOCK[^\]]*\]|\[COLOR FIDELITY\])/g, '<span class="highlight-lock">$1</span>')
            .replace(/(\[INPUT\]|\[TASK\]|\[OUTPUT\]|\[REMOVAL\]|\[AI-NATIVE[^\]]*\]|\[COLOR\])/g, '<span style="color:var(--accent); font-weight:800;">$1</span>')
            .replace(/(NEGATIVE PROMPT:[\s\S]*)/g, '<span class="highlight-neg">$1</span>');

        document.getElementById('out').innerHTML =
            `<div style="font-size:0.65rem; letter-spacing:2px; color:#475569; margin-bottom:20px; text-transform:uppercase; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">${p.label}</div>` + rendered;

        navigator.clipboard.writeText(p.text);
        alert("PROMPT KOPIRAN! 🚀");
    }
</script>
</body>
</html>
