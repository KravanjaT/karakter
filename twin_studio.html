<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - Master Asset Studio V10.5 PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');

        :root { --bg: #020617; --accent: #22d3ee; --strip: #06b6d4; --match: #a855f7; --refine: #10b981; --home: #64748b; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 40px;
            margin: 0;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            max-width: 1500px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
            position: relative;
            z-index: 10;
        }

        .panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            padding: 40px;
            border-radius: 32px;
            border: 1px solid rgba(34, 211, 238, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            margin: 0 0 8px 0;
            font-size: 1.4rem;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 25px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.4);
            padding: 8px;
            border-radius: 18px;
        }

        .type-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.75rem;
            border: 1px solid transparent;
            color: #94a3b8;
        }

        .type-btn.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 4px 15px rgba(34, 211, 238, 0.3);
        }

        .step {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
        }

        .step-badge {
            font-size: 0.65rem;
            font-weight: 900;
            padding: 5px 12px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge-strip { background: var(--strip); color: #000; }
        .badge-match { background: var(--match); color: #fff; }

        .step-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tag {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e1;
        }

        .tag.keep { border-color: rgba(16,185,129,0.3); color: #6ee7b7; }

        .btn {
            width: 100%;
            border: none;
            padding: 18px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-strip { background: var(--strip); color: #000; }
        .btn-match { background: var(--match); color: #fff; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .btn-home {
            background: rgba(100, 116, 139, 0.1);
            color: #94a3b8;
            border: 1px solid rgba(100,116,139,0.2);
            margin-top: 25px;
            padding: 15px;
            font-size: 0.85rem;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
        }

        .output-box {
            background: #000;
            color: #cbd5e1;
            padding: 40px;
            border-radius: 32px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            height: 90vh;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.8;
            border: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 40px;
        }

        .highlight-strip { color: #06b6d4; font-weight: 800; }
        .highlight-match { color: #a855f7; font-weight: 800; }
        .highlight-lock  { color: #10b981; font-weight: 800; }
        .highlight-neg   { color: #f87171; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="panel">
        <h1>🧬 Identity Translation</h1>
        <div class="subtitle">Digital Twin Studio // V10.5 PRO</div>

        <div class="type-selector">
            <div id="btn-face" class="type-btn active" onclick="setType('face')">Face DNA (Headshot)</div>
            <div id="btn-body" class="type-btn" onclick="setType('body')">Anatomical DNA (Full Body)</div>
        </div>

        <div class="step">
            <div class="step-header">
                <span class="step-badge badge-strip">Korak 1</span>
                <span style="font-weight:900; text-transform:uppercase;">Identity Extraction</span>
            </div>
            <div class="step-tags">
                <span class="tag">✕ Motnje</span><span class="tag">✕ Očala</span><span class="tag keep">✓ Facial DNA</span><span class="tag keep">✓ Vivid Skin</span>
            </div>
            <button class="btn btn-strip" id="btn-strip" onclick="showAndCopy('strip', this)">✂️ KOPIRAJ STRIP PROMPT</button>
        </div>

        <div class="arrow" style="text-align: center; font-size: 1.5rem; color: #334155; margin: -5px 0;">↓</div>

        <div class="step">
            <div class="step-header">
                <span class="step-badge badge-match">Korak 2</span>
                <span style="font-weight:900; text-transform:uppercase;">AI Match & Polish</span>
            </div>
            <div class="step-tags">
                <span class="tag keep">✓ DNA Locked</span><span class="tag keep">✓ Pigment Locked</span><span class="tag">✓ 8K Detail</span>
            </div>
            <button class="btn btn-match" id="btn-match" onclick="showAndCopy('match', this)">🔒 KOPIRAJ MASTER MATCH PROMPT</button>
        </div>

        <button class="btn btn-home" onclick="window.location.href='index.html'">🏠 NAZAJ NA DASHBOARD</button>
    </div>

    <div class="output-box" id="out"><span style="color:#1e293b;">// Master Asset Studio pripravljen...</span></div>
</div>

<script>
    let currentType = 'face';

    const DATA = {
        face: {
            strip: {
                label: "STEP 1 — FACE IDENTITY STRIP (V10.5 FINAL PRO)",
                text: `STEP 1 — IDENTITY STRIP (V10.5 FINAL PRO):

Sloji 01-04 (Vsebina & DNA Identiteta):
[INPUT]: Real-life raw photograph (Ref 0).
[TASK]: Precise deconstruction of facial identity. Place subject into neutral studio grey cyclorama.
[DNA LOCK]: 1:1 match of bone structure, jawline, and orbital area from Ref 0.
[IMMUTABLE SKIN DNA]: Do NOT add moles, freckles, or any new skin spots. 0% added pigmentation.
[REMOVAL]: Remove ALL glasses, jewelry, and hats. Clothing: white cotton tee.
[VIVID COLOR]: Maintain 100% natural skin tones. No grayscale, no desaturation.

Sloj 05 (Kamera & Optika): 
35mm/85mm prime lens hybrid perspective. Handheld shake, digital noise, subtle chromatic aberration.

Sloji 06-08 (Tehnični & Svetloba):
On-camera flash, harsh cinematic shadows. Heavy film grain, vignette, sensor noise. 

Sloji 09-10 (Realizem & Tekstura):
Visible pores, natural imperfections, no retouching. Lived-in, spontaneous, private moment look.

Sloj 10 (Output):
Clean, vivid color front-facing diagnostic headshot.

NEGATIVE PROMPT: black and white, grayscale, desaturated, added moles, added freckles, skin spots, pigment marks, glasses, eyewear, smiling, open mouth, beauty filter, airbrushed.`
            },
            match: {
                label: "STEP 2 — AI MATCH / MASTER POLISH (V10.5)",
                text: `STEP 2 — AI DNA MATCH & MASTER POLISH (V10.5):

Sloj 01-04 (Identiteta & DNA Sidro — NE SPREMINJAJ OBRAZA):
[INPUT]: Cleaned vivid base image from Step 1 (Ref 0).
[IMMUTABLE SKIN MAP — ABSOLUTE]: Do NOT generate or add new moles, freckles, pigment spots, or skin marks. 
[SKIN PROTOCOL]: Focus 100% on subsurface light interaction and pore structure. 0% focus on adding pigmentation. 
[IDENTITY LOCK]: Absolute 1:1 match of facial geometry, orbital bone structure, and asymmetry from Ref 0.

Sloj 05 (Kamera):
85mm portrait lens, f/4.0. Cinematic sensor noise ISO 100.

Sloji 06-08 (Tehnični):
Professional studio softbox lighting. [AI-NATIVE UPGRADE]: 8K skin luster, healthy living sheen, complex catchlights.

Sloji 09-10 (Realizem):
Zero digital retouching. Preserve 1:1 original skin surface from Ref 0. 

NEGATIVE PROMPT: black and white, grayscale, added moles, added freckles, skin spots, pigment marks, changed face, plastic skin, CGI, 3D render, beauty filter, airbrushed.`
            }
        },
        body: {
            strip: {
                label: "STEP 1B — FULL BODY ANATOMICAL STRIP (V10.5)",
                text: `STEP 1B — FULL BODY ANATOMICAL LOCK (V10.5):

Sloji 01-04 (Anatomija & Proporci):
[INPUT]: Full-body photo (Ref 0).
[TASK]: Extract full anatomical DNA. Place in white studio.
[IMMUTABLE SKIN]: No new moles or freckles on body or face. 100% color accuracy.
[ANATOMY LOCK]: 1:1 match of height, shoulder width, and skeletal silhouette from Ref 0.
[REMOVAL]: Replace clothes with plain white tee and dark trousers. Remove glasses.

Sloj 05 (Kamera): 35mm prime lens, 5 meters distance. Zero wide-angle distortion.
Sloji 06-10 (Tehnični): Flat studio lighting. 0% added skin blemishes. Lived-in stance.

NEGATIVE PROMPT: black and white, grayscale, desaturated, added moles, added freckles, skin spots, glasses, beauty filter.`
            },
            match: {
                label: "STEP 2B — SKELETAL DNA MATCH (V10.5)",
                text: `STEP 2B — SKELETAL DNA MATCH / CONSTITUTION LOCK (V10.5):

Sloj 01-04 (Skeletna Identiteta & Poliranje):
[INPUT]: Blueprint from Step 1B (Ref 0).
[SKELETAL LOCK]: Absolute lock on height, shoulder width, and silhouette from Ref 0.
[IMMUTABLE PIGMENT LOCK]: Do NOT add new moles, freckles, or spots.

Sloj 05-10 (Realizem):
35mm cinematic professional studio setup. 
[SKIN]: 8K pore detail, subsurface scattering for living skin. Zero retouching.
[CLOTHING]: Realistic heavy cotton texture.

NEGATIVE PROMPT: added moles, added freckles, skin spots, pigment marks, muscle change, plastic skin, CGI, airbrushed.`
            }
        }
    };

    function setType(type) {
        currentType = type;
        document.getElementById('btn-face').className = 'type-btn' + (type === 'face' ? ' active' : '');
        document.getElementById('btn-body').className = 'type-btn' + (type === 'body' ? ' active' : '');
        document.getElementById('out').innerHTML = '<span style="color:#10b981;">// DNA Laboratorij pripravljen za extraction.</span>';
    }

    function showAndCopy(step, btn) {
        const p = DATA[currentType][step];
        const colorClass = step === 'strip' ? 'highlight-strip' : 'highlight-match';

        let rendered = p.text
            .replace(/(STEP \d+[B]* —[^\n]+)/g, `<span class="${colorClass}">$1</span>`)
            .replace(/(Sloj[i]* \d+[^\n]*:)/g, '<span style="color:#f8fafc; font-weight:800; border-bottom:1px solid #1e293b;">$1</span>')
            .replace(/(\[IMMUTABLE[^\]]*\]|\[DNA LOCK[^\]]*\]|\[SKELETAL LOCK[^\]]*\]|\[ANATOMY LOCK[^\]]*\]|\[IDENTITY LOCK[^\]]*\]|\[SKIN PROTOCOL[^\]]*\]|\[IMMUTABLE PIGMENT LOCK[^\]]*\]|\[VIVID COLOR\])/g, '<span class="highlight-lock">$1</span>')
            .replace(/(\[INPUT\]|\[TASK\]|\[OUTPUT\]|\[REMOVAL\]|\[AI-NATIVE[^\]]*\])/g, '<span style="color:var(--accent); font-weight:800;">$1</span>')
            .replace(/(NEGATIVE PROMPT:[\s\S]*)/g, '<span class="highlight-neg">$1</span>');

        document.getElementById('out').innerHTML = rendered;
        navigator.clipboard.writeText(p.text);
        btnFeedback(document.querySelector(".btn-copy"));
    }

function btnFeedback(btn) {
    const orig = btn.innerHTML;
    const origBg = btn.style.background || '';
    btn.innerHTML = '✅ KOPIRANO!';
    btn.style.background = '#10b981';
    btn.style.color = '#000';
    btn.disabled = true;
    setTimeout(() => {
        btn.innerHTML = orig;
        btn.style.background = origBg;
        btn.style.color = '';
        btn.disabled = false;
    }, 1500);
}
</script>
</body>
</html>
