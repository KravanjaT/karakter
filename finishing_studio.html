<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - Finishing Studio V1.1 PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --bg: #020617; --accent: #a855f7; --panel: #0f172a; --text: #f8fafc; --green: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 40px; color: var(--text); margin: 0; }
        .wrapper { max-width: 1750px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .panel { background: var(--panel); padding: 40px; border-radius: 32px; border: 1px solid rgba(168, 85, 247, 0.2); }
        .header { margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .badge { background: var(--accent); color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        h1 { margin: 15px 0 5px 0; font-size: 1.8rem; font-weight: 900; }
        h2 { font-size: 0.75rem; text-transform: uppercase; color: #64748b; margin: 25px 0 10px 0; letter-spacing: 1px; }
        select { width: 100%; padding: 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; background: #1e293b; color: #fff; font-size: 0.95rem; margin-bottom: 15px; appearance: none; cursor: pointer; }
        .output-box { background: #000; color: var(--green); padding: 35px; border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; height: 85vh; overflow-y: auto; white-space: pre-wrap; line-height: 1.8; border: 1px solid #1e293b; position: sticky; top: 40px; }
        .btn-copy { background: var(--accent); color: white; border: none; padding: 22px; width: 100%; border-radius: 16px; cursor: pointer; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        .btn-home { background: rgba(100, 116, 139, 0.1); color: #94a3b8; border: 1px solid rgba(100, 116, 139, 0.2); padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
        .btn-home:hover { background: rgba(100, 116, 139, 0.25); color: #f1f5f9; }
        .status { font-size: 0.65rem; color: #10b981; font-weight: 900; margin-top: 10px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="panel">
        <div class="header">
            <span class="badge">V1.1 • Digital Finishing Lab</span>
            <h1>✨ Lepotna Retuša</h1>
            <div class="status">● SKIN DNA LOCK ACTIVE (NO ADDED MARKS)</div>
        </div>

        <h2>1. IZBERI SPOL (Določa stil in dodatke)</h2>
        <select id="gender" onchange="updateOptions()">
            <option value="female">Ženska Oseba</option>
            <option value="male">Moška Oseba</option>
        </select>

        <h2>2. BARVA LAS (Natural Tones)</h2>
        <select id="hairColor" onchange="updatePrompt()">
            <option value="keep original color">Ohrani originalno barvo</option>
            <option value="natural honey blonde with subtle highlights">Naravno medena blond</option>
            <option value="deep espresso brown, rich and glossy">Globoka espresso rjava</option>
            <option value="soft ash brown with cool undertones">Pepelnato rjava</option>
            <option value="natural auburn red, warm copper tones">Naravna bakreno rdeča</option>
            <option value="classic midnight black, high-shine finish">Naravna polnočna črna</option>
        </select>

        <h2>3. PRIČESKA (Precision Cut)</h2>
        <select id="hairStyle" onchange="updatePrompt()"></select>

        <h2>4. NAKIT (Prestige Details)</h2>
        <select id="jewelry" onchange="updatePrompt()"></select>

        <h2>5. DODATKI (Optical & Tech)</h2>
        <select id="accessories" onchange="updatePrompt()"></select>

        <button class="btn-copy" onclick="copy()">🚀 KOPIRAJ FINISHING PROMPT</button>
        <button class="btn-home" onclick="window.location.href='index.html'">🏠 NAZAJ NA DASHBOARD</button>
    </div>

    <div class="output-box" id="out"></div>
</div>

<script>
    const GENDER_DATA = {
        female: {
            styles: [
                { val: "keep original hair structure", text: "Ohrani originalno pričesko" },
                { val: "precision-cut textured bob, slight volume at roots", text: "Elegantni bob (Bob Cut)" },
                { val: "long soft waves, flowing naturally over shoulders", text: "Dolgi valoviti lasje (Soft Waves)" },
                { val: "slicked-back low ponytail, clean professional part", text: "Nizek čop (Sleek Ponytail)" },
                { val: "voluminous messy bun with loose side strands", text: "Sproščena figa (Messy Bun)" }
            ],
            jewelry: [
                { val: "no jewelry", text: "Brez nakita" },
                { val: "minimalist 14k gold geometric hoop earrings", text: "Zlati obroči (Gold Hoops)" },
                { val: "small diamond stud earrings, 2-carat brilliance", text: "Diamantni uhani (Studs)" },
                { val: "elegant single-strand white pearl necklace", text: "Biseri okoli vratu (Pearls)" },
                { val: "modern silver ear-cuff, architectural design", text: "Srebrna ušesna sponka (Ear-cuff)" }
            ],
            accessories: [
                { val: "no accessories", text: "Brez dodatkov" },
                { val: "designer cat-eye optical glasses, tortoise-shell frame", text: "Mačja očala (Cat-eye)" },
                { val: "thin rose-gold wireframe reading glasses", text: "Tanka rožnato-zlata očala" },
                { val: "premium oversized black sunglasses, high-end acetate", text: "Velika sončna očala (Oversized)" },
                { val: "delicate silk scarf tied loosely around the neck", text: "Svilena ruta (Silk Scarf)" }
            ]
        },
        male: {
            styles: [
                { val: "keep original hair structure", text: "Ohrani originalno pričesko" },
                { val: "classic executive taper fade, short sides, neat top", text: "Poslovni Taper Fade" },
                { val: "textured modern pompadour, natural matte finish", text: "Moderni Pompadour" },
                { val: "rugged buzz cut, uniform length, clean hairline", text: "Buzz Cut (Kratko)" },
                { val: "natural messy bedhead look, textured strands", text: "Sproščen 'Bedhead' videz" }
            ],
            jewelry: [
                { val: "no jewelry", text: "Brez nakita" },
                { val: "single minimalist stainless steel stud in one ear", text: "Enojni jekleni uhan (Stud)" },
                { val: "rugged brushed titanium wedding band on finger", text: "Titanov prstan (Ring)" },
                { val: "small silver cross earring, polished finish", text: "Majhen srebrni križ" },
                { val: "minimalist black carbon fiber ear-stud", text: "Črn karbonski uhan" }
            ],
            accessories: [
                { val: "no accessories", text: "Brez dodatkov" },
                { val: "classic black wayfarer optical glasses", text: "Wayfarer očala" },
                { val: "modern square matte black metal frames", text: "Oglata mat črna očala" },
                { val: "vintage gold-rimmed aviator sunglasses", text: "Aviator sončna očala" },
                { val: "minimalist wireless tech earbuds in ears", text: "Brezžične slušalke (Earbuds)" }
            ]
        }
    };

    function updateOptions() {
        const gender = document.getElementById('gender').value;
        const data = GENDER_DATA[gender];
        
        const populate = (id, list) => {
            const el = document.getElementById(id);
            el.innerHTML = list.map(item => `<option value="${item.val}">${item.text}</option>`).join('');
        };

        populate('hairStyle', data.styles);
        populate('jewelry', data.jewelry);
        populate('accessories', data.accessories);
        updatePrompt();
    }

    function updatePrompt() {
        const color = document.getElementById('hairColor').value;
        const style = document.getElementById('hairStyle').value;
        const jewelry = document.getElementById('jewelry').value;
        const acc = document.getElementById('accessories').value;

        const final = `MASTER FINISHING PROMPT (V1.1 - IDENTITY LOCK):

Sloji 1-3 (Identiteta & DNA - NE SPREMINJAJ):
[IMMUTABLE BASE]: Use Reference Image 0 as the absolute template. 
[IDENTITY LOCK]: Maintain 1:1 facial bone structure, jawline, and natural asymmetry from Ref 0.
[SKIN DNA PRESERVATION]: Strictly preserve all original permanent skin markers (moles, beauty marks) from Ref 0. 
[ANTI-PIGMENTATION]: Do NOT generate new moles, freckles, or skin spots. 0% added pigmentation.

Sloji 4-7 (Digitalna Retuša):
[HAIR MODIFICATION]: Hair color is ${color}. Hair style is ${style}. Ensure perfect integration with original hairline. High-fidelity strand detail.
[JEWELRY ADDITION]: Add ${jewelry}. Realistic metal physics, light reflections, and accurate placement.
[ACCESSORIES]: Add ${acc}. Match fit to Ref 0 facial geometry.

Sloji 8-10 (Optika & Realizem):
Shot on 85mm macro lens. Razor-sharp focus on additions. 
[SKIN TEXTURE]: Visible pores and micro-hairs ONLY. Zero digital retouching.
Professional studio softbox lighting.

NEGATIVE PROMPT: added moles, added freckles, new skin spots, changed face, changed bone structure, CGI, 3D render, plastic skin, airbrushed, beauty filter, blurry jewelry, messy hairline.`;

        document.getElementById('out').innerText = final;
    }

    function copy() {
        navigator.clipboard.writeText(document.getElementById('out').innerText);
        alert("FINISHING PROMPT KOPIRAN! ✨");
    }

    // Inicializacija
    updateOptions();
</script>
</body>
</html>
