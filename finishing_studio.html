<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - Finishing Studio V1.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --bg: #020617; --accent: #a855f7; --panel: #0f172a; --text: #f8fafc; --green: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 40px; color: var(--text); margin: 0; }
        .wrapper { max-width: 1750px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .panel { background: var(--panel); padding: 40px; border-radius: 32px; border: 1px solid rgba(168, 85, 247, 0.2); }
        .header { margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .badge { background: var(--accent); color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        h1 { margin: 15px 0 5px 0; font-size: 1.8rem; font-weight: 900; }
        h2 { font-size: 0.75rem; text-transform: uppercase; color: #64748b; margin: 25px 0 10px 0; letter-spacing: 1px; }
        select { width: 100%; padding: 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; background: #1e293b; color: #fff; font-size: 0.95rem; margin-bottom: 15px; appearance: none; }
        .output-box { background: #000; color: var(--green); padding: 35px; border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; height: 85vh; overflow-y: auto; white-space: pre-wrap; line-height: 1.8; border: 1px solid #1e293b; position: sticky; top: 40px; }
        .btn-copy { background: var(--accent); color: white; border: none; padding: 22px; width: 100%; border-radius: 16px; cursor: pointer; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        .btn-home { background: rgba(100, 116, 139, 0.1); color: #94a3b8; border: 1px solid rgba(100, 116, 139, 0.2); padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
        .btn-home:hover { background: rgba(100, 116, 139, 0.25); color: #f1f5f9; }
        .status { font-size: 0.65rem; color: var(--accent); font-weight: 900; margin-top: 10px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="panel">
        <div class="header">
            <span class="badge">V1.0 • Digital Finishing Lab</span>
            <h1>✨ Lepotna Retuša</h1>
            <div class="status">● HI-RES HEAD DNA ACTIVE</div>
        </div>

        <h2>1. FRIZURA (Precision Hair Cut)</h2>
        <select id="hair" onchange="updatePrompt()">
            <option value="keep original hair structure">Ohrani originalno frizuro</option>
            <option value="precision-cut textured platinum blonde bob, high glossy shine">Platinast bob (Textured Bob)</option>
            <option value="clean corporate low bun, slicked back, professional look">Poslovna figa (Slick Bun)</option>
            <option value="natural loose waves, wind-swept texture, voluminous">Sproščeni valoviti lasje (Loose Waves)</option>
            <option value="sharp side-parted hairstyle, high gloss finish, detailed strands">Strog stranski razperek (High Gloss)</option>
            <option value="modern tapered short cut, messy textured top">Moderen kratki rez (Tapered Cut)</option>
        </select>

        <h2>2. NAKIT (High-End Jewelry)</h2>
        <select id="jewelry" onchange="updatePrompt()">
            <option value="no jewelry">Brez nakita</option>
            <option value="pair of minimalist polished geometric gold hoop earrings">Zlati obroči (Minimalist Hoops)</option>
            <option value="classic 2-carat diamond stud earrings, high brilliance">Diamantni uhani (Studs)</option>
            <option value="elegant black pearl drop earrings with silver hooks">Črni biseri (Pearl Drops)</option>
            <option value="modern architectural silver bar earrings, matte finish">Srebrne palčke (Silver Bars)</option>
            <option value="small luxury emerald earrings, emerald cut, gold setting">Smaragdni detajli (Emerald Cut)</option>
        </select>

        <h2>3. DODATKI (Optical & Tech)</h2>
        <select id="accessories" onchange="updatePrompt()">
            <option value="no accessories">Brez dodatkov</option>
            <option value="designer tortoise-shell optical glasses, anti-reflective lenses">Dioptrijska očala (Tortoise Shell)</option>
            <option value="minimalist black wire-frame glasses, thin bridge">Tanka črna očala (Wire-frame)</option>
            <option value="premium matte black sunglasses, high-end acetate">Premium sončna očala (Matte Black)</option>
            <option value="minimalist transparent tech earbuds in ear">Diskretne slušalke (Tech Earbuds)</option>
        </select>

        <h2>4. SKIN FINISH (Makeup & Glow)</h2>
        <select id="makeup" onchange="updatePrompt()">
            <option value="raw natural skin texture, no makeup">Surova koža (No Makeup)</option>
            <option value="subtle 'no-makeup' look, healthy dewy hydration glow">Zdrav sijaj (Dewy Glow)</option>
            <option value="elegant corporate makeup, matte skin, neutral tones">Poslovni makeup (Matte Corporate)</option>
            <option value="cinematic evening look, soft smokey eye, realistic blending">Večerni videz (Evening Look)</option>
            <option value="high-fashion editorial finish, sharp contours, luminous highlights">Editorial finish (High Fashion)</option>
        </select>

        <button class="btn-copy" onclick="copy()">🚀 KOPIRAJ FINISHING PROMPT</button>
        <button class="btn-home" onclick="window.location.href='index.html'">🏠 NAZAJ NA DASHBOARD</button>
    </div>

    <div class="output-box" id="out"></div>
</div>

<script>
    function updatePrompt() {
        const hair = document.getElementById('hair').value;
        const jewelry = document.getElementById('jewelry').value;
        const acc = document.getElementById('accessories').value;
        const makeup = document.getElementById('makeup').value;

        const final = `MASTER FINISHING PROMPT (V1.0 - BEAUTY & ACCESSORIES):

Sloji 1-3 (Identiteta - NE SPREMINJAJ):
[IMMUTABLE BASE]: Use Reference Image 0 as the absolute template. 
[IDENTITY LOCK]: Maintain 1:1 facial bone structure, jawline, eye distance, and ear position. 
[ZERO-DEVIATION]: No changes to permanent facial features.

Sloji 4-7 (Digitalna Retuša):
[HAIR MODIFICATION]: ${hair}. Ensure realistic integration with the hairline from Ref 0. Individual strand detail, realistic light refraction.
[JEWELRY ADDITION]: Add ${jewelry}. Earrings must respect the ear anatomy of Ref 0. Realistic metal physics and caustics.
[ACCESSORIES]: Add ${acc}. Accurate fit based on Ref 0 facial geometry.
[SKIN & MAKEUP]: Apply ${makeup}. Preserve all original permanent skin marks (moles) from Ref 0. Focus on realistic blending and pore visibility.

Sloji 8-10 (Realizem):
Shot on 85mm macro lens. Razor-sharp focus on facial details. 
Professional studio softbox lighting. Match lighting to additions.
Mandatory: visible pores, micro-hairs, realistic subsurface scattering.

NEGATIVE PROMPT: change face, change bone structure, different person, plastic skin, CGI, airbrushed, beauty filter, blurry jewelry, messy hairline, added moles, added freckles.`;

        document.getElementById('out').innerText = final;
    }

    function copy() {
        navigator.clipboard.writeText(document.getElementById('out').innerText);
        alert("FINISHING PROMPT KOPIRAN! ✨");
    }

    // Inicializacija
    updatePrompt();
</script>
</body>
</html>
