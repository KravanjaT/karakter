<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>IDENTITY OS - Finishing Studio V1.2 PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --bg: #020617; --accent: #a855f7; --panel: #0f172a; --text: #f8fafc; --green: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 40px; color: var(--text); margin: 0; }
        .wrapper { max-width: 1750px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .panel { background: var(--panel); padding: 40px; border-radius: 32px; border: 1px solid rgba(168, 85, 247, 0.2); }
        .header { margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .badge { background: var(--accent); color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        h1 { margin: 15px 0 5px 0; font-size: 1.8rem; font-weight: 900; }
        h2 { font-size: 0.75rem; text-transform: uppercase; color: #64748b; margin: 25px 0 10px 0; letter-spacing: 1px; }
        select { width: 100%; padding: 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; background: #1e293b; color: #fff; font-size: 0.95rem; margin-bottom: 15px; appearance: none; cursor: pointer; }
        .output-box { background: #000; color: var(--green); padding: 35px; border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; height: 85vh; overflow-y: auto; white-space: pre-wrap; line-height: 1.8; border: 1px solid #1e293b; position: sticky; top: 40px; }
        .btn-copy { background: var(--accent); color: white; border: none; padding: 22px; width: 100%; border-radius: 16px; cursor: pointer; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        .btn-home { background: rgba(100, 116, 139, 0.1); color: #94a3b8; border: 1px solid rgba(100, 116, 139, 0.2); padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
        .status { font-size: 0.65rem; color: #10b981; font-weight: 900; margin-top: 10px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="panel">
        <div class="header">
            <span class="badge">V1.2 • Pro Stylist & Jewelry Edition</span>
            <h1>✨ Lepotna Retuša PRO</h1>
            <div class="status">● REAL-TIME IDENTITY DNA LOCK ACTIVE</div>
        </div>

        <h2>1. IZBERI SPOL</h2>
        <select id="gender" onchange="updateOptions()">
            <option value="female">Ženska Oseba (High-End Styling)</option>
            <option value="male">Moška Oseba (Executive Grooming)</option>
        </select>

        <h2>2. BARVA LAS (Advanced Color Palette)</h2>
        <select id="hairColor" onchange="updatePrompt()"></select>

        <h2>3. PRIČESKA (Master Cut)</h2>
        <select id="hairStyle" onchange="updatePrompt()"></select>

        <h2>4. NAKIT (Prestige Materials)</h2>
        <select id="jewelry" onchange="updatePrompt()"></select>

        <h2>5. DODATKI (Premium Optics)</h2>
        <select id="accessories" onchange="updatePrompt()"></select>

        <button class="btn-copy" onclick="copy()">🚀 KOPIRAJ FINISHING PROMPT</button>
        <button class="btn-home" onclick="window.location.href='index.html'">🏠 NAZAJ NA DASHBOARD</button>
    </div>

    <div class="output-box" id="out"></div>
</div>

<script>
    const GENDER_DATA = {
        female: {
            colors: [
                { val: "keep original hair color", text: "Ohrani original" },
                { val: "creamy vanilla blonde with cool ash undertones", text: "Vanilijeva blond" },
                { val: "sun-kissed caramel balayage, seamless transition", text: "Karamelni Balayage" },
                { val: "deep multidimensional espresso brown, mirror-like shine", text: "Espresso rjava (Mirror Shine)" },
                { val: "rich mahogany with subtle violet reflections", text: "Mahagonij s pridihom vijolične" },
                { val: "natural strawberry blonde, warm golden copper", text: "Jagodna blond" },
                { val: "icy platinum blonde, near-white high-fashion tone", text: "Platinasta ledena blond" },
                { val: "dark chocolate brown with honey highlights", text: "Temna čokolada z medom" },
                { val: "vibrant ginger red, high-saturation copper", text: "Živo rdeča (Ginger)" },
                { val: "soft silver-ash grey, sophisticated mature tone", text: "Srebrno-pepelnata siva" },
                { val: "warm chestnut brown with auburn glints", text: "Kostanjevo rjava" },
                { val: "champagne blonde, neutral balanced tone", text: "Šampanjec blond" },
                { val: "midnight onyx black, blue-black iridescent shine", text: "Oniks črna (Midnight)" },
                { val: "rose gold tinted blonde, metallic finish", text: "Rose-Gold blond" },
                { val: "smoky quartz brown, muted cool tone", text: "Dimni kremen rjava" }
            ],
            styles: [
                { val: "keep original structure", text: "Ohrani original" },
                { val: "sleek center-parted glass hair, dead-straight, high gloss", text: "Glass Hair (Ravno/Sijaj)" },
                { val: "voluminous Hollywood glam waves, deep side part", text: "Hollywoodski valovi" },
                { val: "modern shaggy wolf cut with curtain bangs", text: "Wolf Cut s frufrujem" },
                { val: "tight high-fashion sleek bun, ultra-smooth finish", text: "Visoka gladka figa" },
                { val: "loose beach waves, natural salt-water texture", text: "Beach Waves (Sproščeno)" },
                { val: "precision A-line bob, sharp chin-length cut", text: "Ostri A-Line Bob" },
                { val: "soft layers with face-framing highlights, 90s blowout", text: "90s Blowout (Volumen)" },
                { val: "elegant French twist, sophisticated updo", text: "Francoski zvitek (Twist)" },
                { val: "messy low ponytail with face-framing strands", text: "Nizek čop s prameni" },
                { val: "short textured pixie cut, edgy feathered layers", text: "Textured Pixie" }
            ],
            jewelry: [
                { val: "no jewelry", text: "Brez nakita" },
                { val: "18k yellow gold 20mm classic hoop earrings", text: "Zlati obroči (18k Gold)" },
                { val: "3-carat solitaire diamond studs, platinum setting", text: "Diamantni uhani (3ct)" },
                { val: "vintage-style sapphire and diamond drop earrings", text: "Safirni viseči uhani" },
                { val: "minimalist 925 sterling silver snake chain necklace", text: "Srebrna verižica (Snake Chain)" },
                { val: "luxury South Sea pearl necklace, uniform 10mm pearls", text: "Ogrlica iz biserov" },
                { val: "architectural rose gold ear cuff on upper cartilage", text: "Ušesna sponka (Rose Gold)" }
            ],
            accessories: [
                { val: "no accessories", text: "Brez dodatkov" },
                { val: "oversized black acetate butterfly sunglasses, dark lenses", text: "Butterfly sončna očala" },
                { val: "retro gold-rimmed optical glasses, round frames", text: "Retro okrogla očala" },
                { val: "silk floral headscarf tied in a classic 60s style", text: "Svilena ruta (60s style)" },
                { val: "delicate thin black velvet choker", text: "Žametni ovratnik (Choker)" },
                { val: "modern clear-frame blue-light blocking glasses", text: "Prozorna očala" }
            ]
        },
        male: {
            colors: [
                { val: "keep original hair color", text: "Ohrani original" },
                { val: "matte charcoal black, no reflections", text: "Mat ogljeno črna" },
                { val: "natural salt and pepper, sophisticated grey blend", text: "Salt & Pepper (Sivo-črna)" },
                { val: "deep walnut brown, warm natural tones", text: "Orehovo rjava" },
                { val: "cool slate grey, uniform professional silver", text: "Skrilasto siva (Slate)" },
                { val: "sun-bleached dirty blonde, sandy highlights", text: "Peščena blond" },
                { val: "dark bronze brown with copper undertones", text: "Bronasta rjava" }
            ],
            styles: [
                { val: "keep original structure", text: "Ohrani original" },
                { val: "executive side-part fade, razor-sharp hairline", text: "Executive Side-Part" },
                { val: "modern textured quiff, matte clay finish", text: "Textured Quiff (Mat)" },
                { val: "military buzz cut, uniform 3mm length", text: "Buzz Cut (Vojaško)" },
                { val: "slicked back undercut, high contrast", text: "Sleek Undercut" },
                { val: "natural messy top with mid-skin fade", text: "Messy Top + Fade" },
                { val: "classic tapered crew cut, neat and professional", text: "Crew Cut" }
            ],
            jewelry: [
                { val: "no jewelry", text: "Brez nakita" },
                { val: "brushed titanium 8mm wedding band on ring finger", text: "Titanov prstan (Mat)" },
                { val: "single small black diamond stud in left earlobe", text: "Črn diamantni uhan" },
                { val: "minimalist heavy silver curb chain necklace", text: "Srebrna verižica (Curb Chain)" },
                { val: "luxury Swiss automatic watch, steel bracelet, visible under cuff", text: "Luksuzna ura (Steel)" }
            ],
            accessories: [
                { val: "no accessories", text: "Brez dodatkov" },
                { val: "classic dark tortoise-shell wayfarer glasses", text: "Wayfarer (Tortoise)" },
                { val: "matte black square tactical sunglasses", text: "Taktična sončna očala" },
                { val: "minimalist silver-frame aviator glasses", text: "Aviator (Srebrna)" },
                { val: "premium leather-wrapped wireless headphones", text: "Usnjene slušalke" }
            ]
        }
    };

    function updateOptions() {
        const gender = document.getElementById('gender').value;
        const data = GENDER_DATA[gender];
        
        const populate = (id, list) => {
            const el = document.getElementById(id);
            el.innerHTML = list.map(item => `<option value="${item.val}">${item.text}</option>`).join('');
        };

        populate('hairColor', data.colors);
        populate('hairStyle', data.styles);
        populate('jewelry', data.jewelry);
        populate('accessories', data.accessories);
        updatePrompt();
    }

    function updatePrompt() {
        const color = document.getElementById('hairColor').value;
        const style = document.getElementById('hairStyle').value;
        const jewelry = document.getElementById('jewelry').value;
        const acc = document.getElementById('accessories').value;

        const final = `MASTER FINISHING PROMPT (V1.2 - PRO STYLIST):

[LAYER 1-3: IDENTITY ANCHORS]
Ref 0 is the absolute structural source. 1:1 facial geometry. 
Strictly lock all original skin markers (permanent moles, scars, birthmarks). 
Anti-hallucination: Do NOT add new freckles or blemishes.

[LAYER 4-6: ADVANCED GROOMING]
HAIR COLOR: ${color}. 
HAIR STYLE: ${style}. 
Integration: Ultra-realistic hair-to-skin transition, individual strand physics, natural root shadow.

[LAYER 7-8: JEWELRY & OPTICS]
JEWELRY: ${jewelry}. 
Materials: Accurate light refraction for metals (gold/silver/platinum) and stones. 
Placement: Anatomically correct interaction with ears/neck.
ACCESSORIES: ${acc}. 
Optics: High-end lens reflections, realistic frame-to-face fit, slight occlusion on skin where frames touch.

[LAYER 9-10: MASTER FINISH]
Lens: 85mm Prime, f/2.8. 
Texture: RAW skin texture, visible micro-pores, natural oil sheen. 
Lighting: High-end commercial softbox setup, precise catchlights in eyes.

NEGATIVE: airbrushed, plastic skin, CGI, new moles, added freckles, blurry jewelry, distorted frames, messy edges.`;

        document.getElementById('out').innerText = final;
    }

    function copy() {
        navigator.clipboard.writeText(document.getElementById('out').innerText);
        btnFeedback(document.querySelector(".btn-copy"));
    }

    function btnFeedback(btn) {
        const orig = btn.innerHTML;
        btn.innerHTML = '✅ PROMPT READY!';
        btn.style.background = '#10b981';
        btn.style.color = '#000';
        setTimeout(() => {
            btn.innerHTML = orig;
            btn.style.background = '';
            btn.style.color = '';
        }, 1500);
    }

    updateOptions();
</script>
</body>
</html>
