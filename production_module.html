<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>AI Universa - Absolute Perfection V90</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --bg: #020617; --panel: rgba(15,23,42,0.85); --accent: #3b82f6; --text: #f8fafc; --dim: #64748b; --border: rgba(255,255,255,0.08); --green: #10b981; --phase2: #7c3aed; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 30px; color: var(--text); margin: 0; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.1; pointer-events: none; z-index: 0; }
        .wrapper { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 30px; position: relative; z-index: 10; }
        .panel { background: var(--panel); backdrop-filter: blur(20px); padding: 35px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h2 { margin: 0 0 20px 0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--dim); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .group { margin-bottom: 15px; }
        label { display: block; font-weight: 800; font-size: 0.62rem; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; letter-spacing: 1px; }
        select { width: 100%; padding: 12px 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: rgba(0,0,0,0.4); color: var(--text); font-size: 0.88rem; cursor: pointer; font-family: 'Inter', sans-serif; appearance: none; }
        select:focus { outline: none; border-color: var(--accent); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .checkbox-area { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border: 1px solid var(--border); }
        .check-item { display: flex; align-items: center; font-size: 0.78rem; font-weight: 600; cursor: pointer; color: #cbd5e1; }
        .check-item input { width: 16px; height: 16px; margin-right: 10px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
        .output { background: #000; color: #10b981; padding: 30px; border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; height: 1050px; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; border: 1px solid #1e293b; position: sticky; top: 20px; }
        .btn-copy { background: var(--green); color: #000; border: none; padding: 18px; width: 100%; border-radius: 14px; cursor: pointer; font-size: 1rem; font-weight: 900; margin-top: 20px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(16,185,129,0.25); }
        .btn-copy:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(16,185,129,0.35); }
        .btn-phase2 { background: var(--phase2); color: white; border: none; padding: 18px; width: 100%; border-radius: 14px; cursor: pointer; font-size: 1rem; font-weight: 900; margin-top: 12px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 4px 14px rgba(124,58,237,0.25); }
        .btn-phase2:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,58,237,0.4); }
        .btn-home { background: rgba(100,116,139,0.1); color: #94a3b8; border: 1px solid rgba(100,116,139,0.2); padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; margin-top: 12px; transition: 0.3s; letter-spacing: 1px; }
        .btn-home:hover { background: rgba(100,116,139,0.25); color: #f1f5f9; }
        .page-title { margin: 0 0 25px 0; font-size: 1.3rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 15px; }

        :root { --phase3: #ec4899; }
        .output-box { background: #000; color: #10b981; padding: 30px; border-radius: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; height: 1000px; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; border: 1px solid #1e293b; position: sticky; top: 20px; }
        .btn-phase3 { background: var(--phase3); color: white; border: none; padding: 18px; width: 100%; border-radius: 14px; cursor: pointer; font-size: 1rem; font-weight: 900; margin-top: 12px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 4px 15px rgba(236,72,153,0.25); }
        .btn-phase3:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(236,72,153,0.4); }
        .perfection-badge { background: rgba(59,130,246,0.08); color: #93c5fd; padding: 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; border: 1px solid rgba(59,130,246,0.2); margin-bottom: 20px; text-align: center; }
        .header { text-align: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .badge { background: rgba(255,255,255,0.1); color: #f8fafc; padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        h2 { font-size: 0.75rem; text-transform: uppercase; color: #64748b; margin: 20px 0 10px 0; border-left: 3px solid var(--accent); padding-left: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="panel">
        <div class="header">
            <span class="badge">V90 • Absolute Perfection</span>
            <h1>🎬 Produkcijski Studio</h1>
        </div>

        <div class="perfection-badge">
            🎯 AKTIVIRAN 3D SKEN: Vsi vmesni koti za popolno video konsistenco.
        </div>

        <h2>1. Framing & Distance (Razdalja)</h2>
        <div class="group">
            <label>Kadriranje (Shot Type)</label>
            <select id="shotType" onchange="update()">
                <option value="extreme close-up macro shot, focus on skin texture and eyes">Ekstremni Makro (Detajli)</option>
                <option value="close-up portrait shot, head and shoulders">Bližnji portret (Glava/Ramena)</option>
                <option value="waist-up medium shot">Srednji posnetek (Do pasu)</option>
                <option value="medium-long shot, from the knees up (3/4 body)">3/4 telesa (Do kolen)</option>
                <option value="full body standing shot, head-to-toe">Celotna postava</option>
                <option value="wide shot, subject visible in the studio distance">Široki posnetek (Od daleč)</option>
            </select>
        </div>

        <h2>2. Geometric Rotation (Zasuki)</h2>
        <div class="group">
            <label>Horizontalni kot (Zasuk lika)</label>
            <select id="angle" onchange="update()">
                <option value="straight frontal eye-level shot (0°)">Frontalno (0°)</option>
                <option value="slight 15-degree head turn, natural glance">Rahli zasuk (15°)</option>
                <option value="standard three-quarter view (45° perspective)">Klasika (45° Perspektiva)</option>
                <option value="near-profile view (75° angle), showing one eye clearly">Skoraj Profil (75°)</option>
                <option value="strict 90-degree side profile shot">Strogi Profil (90°)</option>
                <option value="back view shot, looking 180-degrees away">Od zadaj (180°)</option>
                <option value="three-quarter view from behind, over-the-shoulder">Preko ramena od zadaj (OTS)</option>
            </select>
        </div>

        <h2>3. Camera Pitch (Višina kamere)</h2>
        <div class="group">
            <label>Vertikalni kot (Perspektiva)</label>
            <select id="pitch" onchange="update()">
                <option value="at eye-level, neutral perspective">V višini oči (Nevtralno)</option>
                <option value="low-angle shot, looking up at the subject, cinematic hero power">Nizek kot (Moč/Heroj)</option>
                <option value="high-angle shot, looking down from above">Visok kot (Pogled od zgoraj)</option>
                <option value="extreme low-angle ground level shot">Iz tal (Extreme Low)</option>
            </select>
        </div>

        <h2>4. Optical Core (Sloj 5)</h2>
        <div class="group">
            <label>Objektiv</label>
            <select id="lens" onchange="update()">
                <option value="35mm lens, handheld shake, raw motion blur">35mm (Surovi realizem)</option>
                <option value="28mm lens, subtle wide-angle distortion">28mm (Ulični dokumentarec)</option>
                <option value="85mm prime lens, sharp facial compression">85mm (Studijska perfekcija)</option>
                <option value="100mm macro lens, ultra-shallow depth of field">100mm (Makro tekstura)</option>
            </select>
        </div>

        <button class="btn-copy" onclick="copy()">📋 KOPIRAJ PERFEKTNI PROMPT</button>
        
        <button class="btn-phase3" onclick="window.location.href='styling_module.html'">👗 POJDI NA FAZO 3 (STILING)</button>
        <button class="btn-home" onclick="window.location.href='index.html'">🏠 NAZAJ NA NADZORNO PLOŠČO</button>
    </div>

    <div class="output-box" id="out"></div>
</div>

<script>
    function update() {
        const shot = document.getElementById('shotType').value;
        const ang = document.getElementById('angle').value;
        const pit = document.getElementById('pitch').value;
        const len = document.getElementById('lens').value;

        const final = `MASTER PRODUCTION PROMPT (V90 PERFECTION):

Sloji 1-4 (Vsebina): Hyper-realistic raw **${shot}** captured from a **${ang}** at **${pit}**.
[STRICT DNA LOCK]: The character in the uploaded Anchor Image is the absolute and only reference for identity, facial DNA, and bone structure.
[ENVIRONMENT & OUTFIT LOCK]: Maintain the EXACT same studio background, lighting temperature, and fabric textures (wardrobe and footwear) as seen in the reference image. Zero deviations allowed.

Sloj 5 (Kamera): Shot on ${len}. Handheld shake, digital šum, chromatic aberration for raw analog feel.

Sloji 6-8 (Tehnični): Lighting setup identical to the anchor reference. On-camera flash, harsh realistic shadows. Atmosphere: dust particles, realistic condensation. Colors: dirty cinematic grading, heavy film grain, vignette.

Sloji 9-10 (Realizem): Mandatory skin texture: visible pores, natural skin imperfections (moles, redness, oil sheen), zero digital retouching. Spontaneous, unposed production shot.

NEGATIVE PROMPT: perfect skin, airbrushed, studio softbox lighting, clean background, symmetrical, 3D render, CGI, cartoon, doll-like, professional model pose, beauty filter, different clothing, different scene, different heritage.`;

        document.getElementById('out').innerText = final;
    }

    function copy() {
        navigator.clipboard.writeText(document.getElementById('out').innerText);
        alert("PERFEKTNI PROMPT KOPIRAN!");
    }
    update();
</script>
</body>
</html>
